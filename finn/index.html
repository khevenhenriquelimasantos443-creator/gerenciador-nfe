function bindTxRowEvents(scope){
  scope.querySelectorAll("[data-edit]").forEach(function(btn){
    btn.addEventListener("click", function(){ startEdit(btn.dataset.edit); });
  });
  scope.querySelectorAll("[data-del]").forEach(function(btn){
    btn.addEventListener("click", function(){ deleteTransaction(btn.dataset.del); });
  });
  scope.querySelectorAll("[data-receipt-trigger]").forEach(function(btn){
    btn.addEventListener("click", function(){
      var id = btn.dataset.receiptTrigger;
      var t = state.txs.filter(function(x){ return x.id === id; })[0];
      if(t && t.receipt_path){
        viewReceipt(t.receipt_path);
      } else {
        var input = scope.querySelector('[data-receipt-input="' + id + '"]');
        if(input) input.click();
      }
    });
  });
  scope.querySelectorAll("[data-receipt-input]").forEach(function(input){
    input.addEventListener("change", function(){
      var file = input.files[0];
      if(file) uploadReceipt(file, input.dataset.receiptInput);
    });
  });
}

/* ── transaction CRUD ── */
function saveTransaction(){
  var value = parseFloat(formState.value);
  if(!value || value <= 0) return;
  var fields = {
    type: formState.type,
    category: formState.category,
    description: formState.description || formState.category,
    value: value,
    date: formState.date
  };
  if(state.cards.length) fields.card_id = formState.type === "despesa" ? (formState.cardId || null) : null;
  if(formState.editingId){
    var id = formState.editingId;
    var original = state.txs.filter(function(t){ return t.id === id; })[0];
    var categoryChanged = original && original.category !== fields.category;
    db("transactions", "PATCH", fields, { id: "eq." + id, user_id: "eq." + uid() }).then(function(rows){
      var updated = (rows && rows[0]) ? rows[0] : null;
      state.txs = state.txs.map(function(t){
        return t.id === id ? (updated || Object.assign({}, t, fields)) : t;
      });
      sortTxs(); resetForm(); state.tab = "lancamentos";
      if(categoryChanged){
        var siblings = state.txs.filter(function(t){
          return t.id !== id && t.type === fields.type && normDesc(t.description) === normDesc(fields.description) && t.category !== fields.category;
        });
        if(siblings.length){
          state.bulkCatPrompt = { ids: siblings.map(function(t){ return t.id; }), description: fields.description, category: fields.category };
        }
      }
      checkPriceAnomaly(fields.type, fields.description, fields.value, id);
      render();
    });
  } else {
    var payload = Object.assign({ user_id: uid() }, fields);
    db("transactions", "POST", payload).then(function(rows){
      if(rows && rows[0]) state.txs.unshift(rows[0]);
      sortTxs();
      formState.value = ""; formState.description = "";
      checkPriceAnomaly(fields.type, fields.description, fields.value, rows && rows[0] && rows[0].id);
      render();
    });
  }
}

function fixInvestmentCategories(){
  var ids = [];
  state.txs.forEach(function(t){
    if(t.category === "Investimento") return;
    var guessed = guessCategory(t.description || "");
    if(guessed === "Investimento") ids.push(t.id);
  });
  if(!ids.length){
    state.configMsg = "Nenhum lançamento precisava de correção. Já está tudo certo.";
    render();
    return;
  }
  state.txs = state.txs.map(function(t){
    return ids.indexOf(t.id) !== -1 ? Object.assign({}, t, { category: "Investimento" }) : t;
  });
  state.configMsg = "Corrigindo " + ids.length + " lançamento(s)...";
  render();
  db("transactions", "PATCH", { category: "Investimento" }, { id: "in.(" + ids.join(",") + ")", user_id: "eq." + uid() }).then(function(){
    state.configMsg = ids.length + " lançamento(s) reclassificado(s) como Investimento.";
    render();
  }).catch(function(err){
    state.configMsg = "Reclassifiquei localmente, mas não consegui salvar tudo no banco (" + (err && err.message ? err.message : "erro") + "). Tenta de novo.";
    render();
  });
}

function applyBulkCategory(){
  var prompt = state.bulkCatPrompt;
  if(!prompt) return;
  var ids = prompt.ids;
  state.txs = state.txs.map(function(t){
    return ids.indexOf(t.id) !== -1 ? Object.assign({}, t, { category: prompt.category }) : t;
  });
  state.bulkCatPrompt = null;
  render();
  db("transactions", "PATCH", { category: prompt.category }, { id: "in.(" + ids.join(",") + ")", user_id: "eq." + uid() });
}

function dismissBulkCatPrompt(){
  state.bulkCatPrompt = null;
  render();
}

function dismissPriceAlert(){
  state.priceAlert = null;
  render();
}

function dismissReceiptMsg(){
  state.receiptMsg = null;
  render();
}

function startEdit(id){
  var t = state.txs.filter(function(x){ return x.id === id; })[0];
  if(!t) return;
  formState = {
    editingId: id, type: t.type, category: t.category,
    description: t.description || "", value: String(t.value), date: t.date, cardId: t.card_id || ""
  };
  state.tab = "lancamentos";
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function deleteTransaction(id){
  var existing = state.txs.filter(function(t){ return t.id === id; })[0];
  var receiptPath = existing && existing.receipt_path;
  state.txs = state.txs.filter(function(t){ return t.id !== id; });
  if(formState.editingId === id) resetForm();
  render();
  db("transactions", "DELETE", null, { id: "eq." + id, user_id: "eq." + uid() });
  if(receiptPath) deleteReceiptObject(receiptPath);
}

/* ── comprovante (foto/recibo) ── */
function deleteReceiptObject(path){
  var token = (currentSession && currentSession.access_token) || SUPA_KEY;
  fetch(SUPA_URL + "/storage/v1/object/receipts/" + path, {
    method: "DELETE",
    headers: { apikey: SUPA_KEY, Authorization: "Bearer " + token }
  }).catch(function(){});
}

function uploadReceipt(file, txId){
  state.receiptUploadingId = txId;
  state.receiptMsg = null;
  render();
  var path = uid() + "/" + txId + "-" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9.\-_]/g, "_");
  var token = (currentSession && currentSession.access_token) || SUPA_KEY;
  fetch(SUPA_URL + "/storage/v1/object/receipts/" + path, {
    method: "POST",
    headers: { apikey: SUPA_KEY, Authorization: "Bearer " + token, "Content-Type": file.type || "application/octet-stream" },
    body: file
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error(t || ("Erro " + r.status)); });
    return db("transactions", "PATCH", { receipt_path: path }, { id: "eq." + txId, user_id: "eq." + uid() });
  }).then(function(rows){
    var updated = rows && rows[0];
    state.txs = state.txs.map(function(t){ return t.id === txId ? (updated || Object.assign({}, t, { receipt_path: path })) : t; });
    state.receiptUploadingId = null;
    render();
  }).catch(function(err){
    state.receiptUploadingId = null;
    state.receiptMsg = "Não consegui anexar o comprovante (" + (err && err.message ? err.message : "erro") + "). Verifique se rodou supabase/08_receipts.sql.";
    render();
  });
}

function viewReceipt(path){
  var token = (currentSession && currentSession.access_token) || SUPA_KEY;
  fetch(SUPA_URL + "/storage/v1/object/sign/receipts/" + path, {
    method: "POST",
    headers: { apikey: SUPA_KEY, Authorization: "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify({ expiresIn: 60 })
  }).then(function(r){ return r.json(); }).then(function(data){
    if(data && data.signedURL) window.open(SUPA_URL + "/storage/v1" + data.signedURL, "_blank");
    else { state.receiptMsg = "Não consegui abrir o comprovante."; render(); }
  }).catch(function(){
    state.receiptMsg = "Não consegui abrir o comprovante.";
    render();
  });
}

/* ── limits CRUD ── */
function saveLimit(){
  var value = parseFloat(limitForm.value);
  if(isNaN(value) || value < 0) return;
  var cat = limitForm.category;
  var existing = state.limits.filter(function(l){ return l.category === cat; })[0];
  if(existing){
    db("spending_limits", "PATCH", { monthly_limit: value }, { id: "eq." + existing.id, user_id: "eq." + uid() }).then(function(rows){
      existing.monthly_limit = value;
      limitForm.value = ""; render();
    });
  } else {
    db("spending_limits", "POST", { user_id: uid(), category: cat, monthly_limit: value }).then(function(rows){
      if(rows && rows[0]) state.limits.push(rows[0]);
      limitForm.value = ""; render();
    });
  }
}

function deleteLimit(id){
  state.limits = state.limits.filter(function(l){ return l.id !== id; });
  render();
  db("spending_limits", "DELETE", null, { id: "eq." + id, user_id: "eq." + uid() });
}

/* ── goals CRUD ── */
function saveGoal(){
  var target = parseFloat(goalForm.target);
  if(!goalForm.name || !target || target <= 0) return;
  var payload = {
    user_id: uid(), name: goalForm.name, emoji: goalForm.emoji,
    target: target, deadline: goalForm.deadline || null
  };
  db("goals", "POST", payload).then(function(rows){
    if(rows && rows[0]) state.goals.push(rows[0]);
    goalForm = { name: "", emoji: "🎯", target: "", deadline: "" };
    render();
  });
}

function addToGoal(id, amountStr, direction){
  var amount = parseFloat(amountStr);
  if(!amount || amount <= 0) return;
  var goal = state.goals.filter(function(g){ return g.id === id; })[0];
  if(!goal) return;
  var sub = direction === "sub";
  var delta = sub ? -amount : amount;
  var newSaved = Math.max(0, Number(goal.saved) + delta);
  var movedAmount = Math.abs(newSaved - Number(goal.saved));
  goal.saved = newSaved;
  render();
  db("goals", "PATCH", { saved: newSaved }, { id: "eq." + id, user_id: "eq." + uid() });
  if(movedAmount > 0){
    var mov = { user_id: uid(), goal_id: id, amount: movedAmount, type: sub ? "retirada" : "deposito", date: new Date().toISOString().slice(0,10) };
    db("goal_movements", "POST", mov).then(function(rows){
      if(rows && rows[0]) state.goalMovements.unshift(rows[0]);
      render();
    });
  }
}

function deleteGoal(id){
  state.goals = state.goals.filter(function(g){ return g.id !== id; });
  render();
  db("goals", "DELETE", null, { id: "eq." + id, user_id: "eq." + uid() });
}

/* ── fixed accounts CRUD ── */
function syncFixedForm(){
  var desc = document.getElementById("fixedDescription");
  var cat = document.getElementById("fixedCategory");
  var val = document.getElementById("fixedValue");
  if(desc) fixedForm.description = desc.value;
  if(cat) fixedForm.category = cat.value;
  if(val) fixedForm.value = val.value;
}

function saveFixed(){
  var value = parseFloat(fixedForm.value);
  var day = parseInt(fixedForm.dayOfMonth, 10);
  if(!fixedForm.description || !value || value <= 0 || !day || day < 1 || day > 31) return;
  var payload = {
    user_id: uid(), type: fixedForm.type, description: fixedForm.description,
    category: fixedForm.category, value: value, day_of_month: day
  };
  db("fixed_accounts", "POST", payload).then(function(rows){
    if(rows && rows[0]) state.fixed.push(rows[0]);
    fixedForm = { type: "despesa", description: "", category: "Outros", value: "", dayOfMonth: "1" };
    render();
  });
}

function addRecurringAsFixed(key){
  var candidate = detectRecurringCandidates().filter(function(c){ return c.key === key; })[0];
  if(!candidate) return;
  var payload = {
    user_id: uid(), type: candidate.type, description: candidate.description,
    category: candidate.category, value: candidate.value, day_of_month: candidate.day
  };
  db("fixed_accounts", "POST", payload).then(function(rows){
    if(rows && rows[0]) state.fixed.push(rows[0]);
    dismissRecurring(key);
  });
}

function launchFixed(id){
  var f = state.fixed.filter(function(x){ return x.id === id; })[0];
  if(!f) return;
  var ym = thisMonth();
  var months = (f.launched_months || []).concat([ym]);
  var txPayload = {
    user_id: uid(), type: f.type, category: f.category,
    description: f.description, value: Number(f.value), date: new Date().toISOString().slice(0,10)
  };
  Promise.all([
    db("transactions", "POST", txPayload),
    db("fixed_accounts", "PATCH", { launched_months: months }, { id: "eq." + id, user_id: "eq." + uid() })
  ]).then(function(res){
    var newTx = res[0] && res[0][0];
    if(newTx) state.txs.unshift(newTx);
    f.launched_months = months;
    sortTxs();
    checkPriceAnomaly(f.type, f.description, Number(f.value), newTx && newTx.id);
    render();
  });
}

function deleteFixed(id){
  state.fixed = state.fixed.filter(function(f){ return f.id !== id; });
  render();
  db("fixed_accounts", "DELETE", null, { id: "eq." + id, user_id: "eq." + uid() });
}

function syncCardForm(){
  var name = document.getElementById("cardName");
  var limit = document.getElementById("cardLimit");
  var closingDay = document.getElementById("cardClosingDay");
  var dueDay = document.getElementById("cardDueDay");
  if(name) cardForm.name = name.value;
  if(limit) cardForm.limitValue = limit.value;
  if(closingDay) cardForm.closingDay = closingDay.value;
  if(dueDay) cardForm.dueDay = dueDay.value;
}

function saveCard(){
  var name = (cardForm.name || "").trim();
  var limitValue = parseFloat(cardForm.limitValue) || 0;
  var closingDay = parseInt(cardForm.closingDay, 10);
  var dueDay = parseInt(cardForm.dueDay, 10);
  if(!name || !closingDay || closingDay < 1 || closingDay > 31 || !dueDay || dueDay < 1 || dueDay > 31) return;
  var payload = { user_id: uid(), name: name, limit_value: limitValue, closing_day: closingDay, due_day: dueDay };
  db("credit_cards", "POST", payload).then(function(rows){
    if(rows && rows[0]) state.cards.push(rows[0]);
    cardForm = { name: "", limitValue: "", closingDay: "5", dueDay: "10" };
    state.cardsError = null;
    render();
  }).catch(function(err){
    state.cardsError = (err && err.message) || "Erro desconhecido";
    render();
  });
}

function deleteCard(id){
  state.cards = state.cards.filter(function(c){ return c.id !== id; });
  render();
  db("credit_cards", "DELETE", null, { id: "eq." + id, user_id: "eq." + uid() }).catch(function(){});
}

function loadCards(){
  db("credit_cards", "GET", null, { user_id: "eq." + uid(), order: "created_at.asc" }).then(function(rows){
    state.cards = rows || [];
    state.cardsError = null;
    render();
  }).catch(function(err){
    state.cards = [];
    state.cardsError = (err && err.message) || "Erro desconhecido";
    render();
  });
}

// Busca todas as páginas: o limite de 1000 por requisição (padrão do
// PostgREST) cortava lançamentos antigos quando a conta passava de
// 1000 transações, sumindo com meses inteiros sem aviso nenhum.
function dbAll(table, query){
  var pageSize = 1000;
  var all = [];
  function fetchPage(offset){
    var q = Object.assign({}, query, { limit: String(pageSize), offset: String(offset) });
    return db(table, "GET", null, q).then(function(rows){
      rows = rows || [];
      all = all.concat(rows);
      if(rows.length === pageSize) return fetchPage(offset + pageSize);
      return all;
    });
  }
  return fetchPage(0);
}

/* ── data load ── */
function loadData(){
  state.loading = true;
  state.loadError = null;
  return Promise.all([
    dbAll("transactions", { user_id: "eq." + uid(), order: "date.desc,created_at.desc" }),
    db("spending_limits", "GET", null, { user_id: "eq." + uid() }),
    db("goals", "GET", null, { user_id: "eq." + uid() }),
    db("fixed_accounts", "GET", null, { user_id: "eq." + uid() }),
    db("goal_movements", "GET", null, { user_id: "eq." + uid(), order: "created_at.desc" }),
    db("splits", "GET", null, { user_id: "eq." + uid(), order: "date.desc" }),
    db("split_participants", "GET", null, { user_id: "eq." + uid() }),
    db("categories", "GET", null, { user_id: "eq." + uid(), order: "name.asc" })
  ]).then(function(res){
    state.txs = res[0] || [];
    state.limits = res[1] || [];
    state.goals = res[2] || [];
    state.fixed = res[3] || [];
    state.goalMovements = res[4] || [];
    state.splits = res[5] || [];
    state.splitParticipants = res[6] || [];
    state.customCategories = res[7] || [];
    sortTxs();
    state.loading = false;
    render();
    syncWhatsAppBot();
  }).catch(function(err){
    state.loading = false;
    state.loadError = (err && err.message) || "Erro desconhecido";
    render();
  });
}

function showApp(){
  document.body.classList.add("finn-authed");
  document.getElementById("loginScreen").style.display = "none";
  loadData();
  loadCards();
}

function showLogin(){
  document.body.classList.remove("finn-authed");
  document.getElementById("loginScreen").style.display = "flex";
}

function applyTheme(){
  var dark = localStorage.getItem("finn_dark_mode") === "1";
  document.body.classList.toggle("finn-dark", dark);
  var btn = document.getElementById("btnDarkToggle");
  if(btn) btn.textContent = dark ? "☀️ Modo claro" : "🌙 Modo escuro";
}

function toggleDarkMode(){
  var dark = localStorage.getItem("finn_dark_mode") === "1";
  localStorage.setItem("finn_dark_mode", dark ? "0" : "1");
  applyTheme();
}

applyTheme();

/* ── one-time purge of leftover service workers from old deploys ──
   A stale SW from a previous version could keep intercepting fetches
   (incl. the update-check below) forever. This now runs only once per
   browser (gated by localStorage) so a SW registered afterwards for
   push notifications isn't immediately killed on the next page load. */
if ("serviceWorker" in navigator && !localStorage.getItem("finn_sw_purge_v1")) {
  var wasSwControlled = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(reg){ reg.unregister(); });
    localStorage.setItem("finn_sw_purge_v1", "1");
    if (wasSwControlled && !sessionStorage.getItem("finn_sw_cleanup_done")) {
      sessionStorage.setItem("finn_sw_cleanup_done", "1");
      window.location.reload();
    }
  });
}
if (window.caches) {
  caches.keys().then(function(keys){
    keys.forEach(function(k){ caches.delete(k); });
  });
}

/* ── push notifications ── */
function urlBase64ToUint8Array(base64String){
  var padding = "=".repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  var rawData = atob(base64);
  var out = new Uint8Array(rawData.length);
  for(var i = 0; i < rawData.length; i++) out[i] = rawData.charCodeAt(i);
  return out;
}

function arrayBufferToBase64Url(buffer){
  var bytes = new Uint8Array(buffer);
  var bin = "";
  for(var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function enablePushNotifications(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window)){
    state.pushStatus = "Seu navegador não suporta notificações push.";
    render();
    return;
  }
  state.pushStatus = "Ativando…";
  render();
  navigator.serviceWorker.register("/sw.js").then(function(reg){
    return Notification.requestPermission().then(function(perm){
      if(perm !== "granted") throw new Error("Permissão de notificações negada.");
      return reg.pushManager.getSubscription().then(function(existing){
        return existing || reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      });
    });
  }).then(function(sub){
    return fetch("/push/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        endpoint: sub.endpoint,
        keys: {
          p256dh: arrayBufferToBase64Url(sub.getKey("p256dh")),
          auth: arrayBufferToBase64Url(sub.getKey("auth"))
        },
        access_token: currentSession && currentSession.access_token
      })
    });
  }).then(function(r){ return r.json(); }).then(function(j){
    state.pushStatus = (j && j.ok) ? "Notificações ativadas! Você vai receber avisos de contas fixas vencendo." : "Não foi possível ativar agora. Tente de novo.";
    render();
  }).catch(function(err){
    state.pushStatus = "Erro: " + err.message;
    render();
  });
}

/* ── update banner ── */
var knownETag = null;
function checkForUpdate(){
  fetch(window.location.pathname, { method: "HEAD", cache: "no-store" }).then(function(r){
    var et = r.headers.get("ETag");
    if(!et) return;
    if(knownETag === null){ knownETag = et; return; }
    if(et !== knownETag){
      document.getElementById("updateBanner").classList.add("show");
    }
  }).catch(function(){});
}
checkForUpdate();
setInterval(checkForUpdate, 5 * 60 * 1000);
document.addEventListener("visibilitychange", function(){
  if(!document.hidden) checkForUpdate();
});

// teste manual: abra a URL do app com ?testbanner=1 no final para forçar o banner
if (new URLSearchParams(window.location.search).get("testbanner") === "1") {
  document.getElementById("updateBanner").classList.add("show");
}
document.getElementById("btnUpdateNow").addEventListener("click", function(){
  window.location.reload();
});

document.getElementById("btnConfigNav").addEventListener("click", function(){
  state.tab = "config";
  render();
  document.getElementById("navMenu").classList.remove("open");
});
document.getElementById("btnLogoutNav").addEventListener("click", function(){
  Auth.logout(currentSession.access_token).then(function(){
    currentSession = null;
    showLogin();
  });
  document.getElementById("navMenu").classList.remove("open");
});
document.querySelectorAll(".tab-btn").forEach(function(btn){
  btn.addEventListener("click", function(){
    state.tab = btn.dataset.tab;
    render();
    document.getElementById("navMenu").classList.remove("open");
  });
});
document.getElementById("btnMenu").addEventListener("click", function(e){
  e.stopPropagation();
  document.getElementById("navMenu").classList.toggle("open");
});
document.addEventListener("click", function(e){
  var navMenu = document.getElementById("navMenu");
  if(!navMenu.classList.contains("open")) return;
  if(navMenu.contains(e.target) || e.target === document.getElementById("btnMenu")) return;
  navMenu.classList.remove("open");
});

Auth.initSession().then(function(session){
  if(session){
    currentSession = session;
    showApp();
  } else {
    showLogin();
  }
});

})();
