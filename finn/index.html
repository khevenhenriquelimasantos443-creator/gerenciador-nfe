<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--fp:#F97316;--fpl:#FFEDD5;--fd:#1E293B;--fdk:#0F172A;--fbg:#F8F7F4;--fb:#E2E8F0;--fm:#64748B;--fs:#059669;--fe:#DC2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F8F7F4;color:#1E293B;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}::-webkit-scrollbar-track{background:transparent}
input,select,button,textarea{font-family:inherit}
input[type=date]{-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:#F97316!important;box-shadow:0 0 0 3px rgba(249,115,22,.15)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;color:#64748B;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid #E8ECF2}
td{padding:11px 14px;border-bottom:1px solid #E8ECF2}
tr:last-child td{border:none}
tr:hover td{background:#F8FAFF}
.fade{animation:fd .25s ease}
@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.tabs{overflow-x:auto;scrollbar-width:none;display:flex;position:-webkit-sticky;position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #E2E8F0}
.tabs::-webkit-scrollbar{display:none}
/* ── Calendar ── */
.fp-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:4px}
.fp-cal-hdr{text-align:center;font-size:9px;font-weight:700;color:#94A3B8;text-transform:uppercase;padding:4px 0}
.fp-cal-day{border-radius:7px;padding:4px 2px;min-height:42px;background:#F8FAFC;cursor:pointer;transition:all .12s;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;gap:1px}
.fp-cal-day:hover{background:#FFF7ED;border-color:#F97316}
.fp-cal-day.today{background:#FFF7ED;border-color:#F97316}
.fp-cal-day.has-tx{background:#F0FDF4}
.fp-cal-day.has-tx:hover{background:#DCFCE7;border-color:#16a34a}
.fp-cal-day.selected{background:#DBEAFE;border-color:#3B82F6}
.fp-cal-day.empty{background:transparent;cursor:default;pointer-events:none}
.fp-cal-num{font-size:10px;font-weight:700;color:#475569;line-height:1}
.fp-cal-day.today .fp-cal-num{color:#F97316}
.fp-cal-day.selected .fp-cal-num{color:#2563EB}
.fp-cal-dot{width:4px;height:4px;border-radius:50%}
.fp-cal-dot.r{background:#059669}
.fp-cal-dot.d{background:#DC2626}
.fp-cal-val{font-size:7.5px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;max-width:36px;padding:0 1px}
.fp-cal-val.p{color:#059669}.fp-cal-val.n{color:#DC2626}
.fp-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.fp-cal-nav-btn{background:#F1F5F9;border:none;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:16px;color:#475569;transition:background .12s;font-family:inherit;font-weight:600}
.fp-cal-nav-btn:hover{background:#E2E8F0}
.fp-cal-month{font-size:13px;font-weight:800;color:#1E293B;letter-spacing:-.02em}
.fp-cal-detail{background:#F8FAFC;border-radius:10px;padding:10px;margin-top:8px;max-height:160px;overflow-y:auto;border:1px solid #E2E8F0}
.fp-cal-tx-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #E2E8F0;font-size:12px;gap:8px}
.fp-cal-tx-row:last-child{border:none}
.fp-cal-tx-desc{color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.fp-cal-empty{font-size:12px;color:#94A3B8;text-align:center;padding:12px 0}
/* ── Help Accordion ── */
.fp-help-item{border:1px solid #E2E8F0;border-radius:10px;margin-bottom:6px;overflow:hidden;background:#fff;transition:border-color .15s}
.fp-help-item.open{border-color:#F97316}
.fp-help-q{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;font-size:13px;font-weight:600;color:#1E293B;cursor:pointer;user-select:none;background:#fff}
.fp-help-q:hover{background:#FAFAFA}
.fp-help-chv{color:#94A3B8;transition:transform .2s;font-size:12px;flex-shrink:0;margin-left:8px}
.fp-help-item.open .fp-help-chv{transform:rotate(180deg);color:#F97316}
.fp-help-a{display:none;padding:10px 13px 13px;font-size:12.5px;color:#475569;line-height:1.7;border-top:1px solid #FEF3C7;background:#FFFBEB}
.fp-help-item.open .fp-help-a{display:block}
/* ── Admin Panel ── */
.fp-admin-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#F8FAFC;margin-bottom:6px;cursor:pointer;transition:all .12s;border:1.5px solid transparent}
.fp-admin-user:hover{background:#FFF7ED;border-color:#FFEDD5}
.fp-admin-user.active-imp{border-color:#F97316;background:#FFF7ED}
.fp-admin-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#F97316,#fb923c);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.fp-admin-email{font-size:12px;font-weight:600;color:#1E293B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fp-admin-stat{font-size:11px;color:#94A3B8;margin-top:1px}
.fp-admin-badge{font-size:10px;background:#FFF7ED;color:#F97316;border:1px solid #FFEDD5;border-radius:99px;padding:2px 8px;font-weight:700;flex-shrink:0;white-space:nowrap}
.fp-imp-bar{background:linear-gradient(90deg,#F97316,#fb923c);color:#fff;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.fp-imp-bar button{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;transition:background .12s}
.fp-imp-bar button:hover{background:rgba(255,255,255,.4)}
.fp-sql-block{display:block;background:#1E293B;color:#E2E8F0;border-radius:8px;padding:10px;margin-top:6px;font-size:10px;line-height:1.6;word-break:break-all;font-family:monospace}
/* ── SW Update Banner ── */
#finn-sw-banner{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99999;background:#1E293B;color:#fff;border-radius:14px;padding:12px 18px;font-size:13px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.4);align-items:center;gap:12px;white-space:nowrap;border:1px solid rgba(255,255,255,.1)}
#finn-sw-banner.show{display:flex;animation:swBan .3s ease}
@keyframes swBan{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#finn-sw-banner .sw-update-btn{background:#F97316;border:none;color:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
#finn-sw-banner .sw-dismiss-btn{background:transparent;border:none;color:#94A3B8;cursor:pointer;font-size:18px;padding:0 2px;line-height:1}
/* ── iOS / Responsive ── */
@media(max-width:640px){
  #finn-plus-panel{border-radius:20px 20px 0 0}
  #fw-panel{border-radius:18px 18px 0 0}
  #fw-ovl,#finn-plus-ovl{padding:0!important;align-items:flex-end!important}
  #finn-plus-panel{max-height:90vh}
}
@supports(-webkit-backdrop-filter:blur(1px)){
  #finn-plus-ovl{-webkit-backdrop-filter:blur(3px)}
  #finn-priv-btn{-webkit-backdrop-filter:blur(8px)}
}

/* ── GLOBAL PRO ──────────────────────────────────────── */
.sec-card{border-radius:14px!important;border:1px solid #EEF2F7!important;box-shadow:0 1px 4px rgba(15,23,42,.05)!important}
.sec-title-m{font-size:11px!important;letter-spacing:.07em!important;font-weight:700!important;color:#94A3B8!important}

/* ── NAV PRO ─────────────────────────────────────────────
   Redesign das abas: underline limpo, tipografia refinada  */
.tabs{
  background:#fff!important;
  border-bottom:1.5px solid #EEF2F7!important;
  padding:0 20px!important;
  gap:0!important;
  box-shadow:0 2px 8px rgba(15,23,42,.05)!important;
  position:sticky!important;
  top:0!important;
  z-index:10!important;
}
.tabs button{
  height:46px!important;
  padding:0 14px!important;
  font-size:12.5px!important;
  letter-spacing:-.015em!important;
  border-radius:0!important;
  border:none!important;
  border-bottom:2px solid transparent!important;
  color:#94A3B8!important;
  font-weight:500!important;
  transition:color .18s,border-color .18s!important;
  flex-shrink:0!important;
  white-space:nowrap!important;
}
.tabs button:hover{color:#64748B!important}
/* Aba ativa — detecta pelo font-weight:700 que o React injeta inline */
.tabs button[style*="font-weight: 700"]{
  color:#0F172A!important;
  font-weight:700!important;
  border-bottom-color:#F97316!important;
}
@keyframes finn-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes finn-glow{0%,100%{box-shadow:0 0 0 1px rgba(249,115,22,0.3),0 20px 60px rgba(249,115,22,0.2)}50%{box-shadow:0 0 0 2px rgba(249,115,22,0.65),0 24px 72px rgba(249,115,22,0.5),0 0 50px rgba(249,115,22,0.22)}}
@keyframes finn-login-in{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes finn-login-in-delay{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>


</head>

<script>
// ── Finn Version & Service Worker ──────────────────────────────────────
window.FINN_VERSION = '2.1.0';
(function(){
  function injectSWBanner() {
    var b = document.createElement('div');
    b.id = 'finn-sw-banner';
    b.innerHTML = 'Nova versão disponível <button class="sw-update-btn" onclick="location.reload(true)">Atualizar</button>'
      + '<button class="sw-dismiss-btn" onclick="this.parentNode.classList.remove(\'show\')" title="Fechar">×</button>';
    document.body.appendChild(b);
  }
  function showSWBanner() {
    var b = document.getElementById('finn-sw-banner');
    if (b) b.classList.add('show');
  }
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        reg.addEventListener('updatefound', function() {
          var newSW = reg.installing;
          if (!newSW) return;
          newSW.addEventListener('statechange', function() {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              showSWBanner();
            }
          });
        });
      }).catch(function(){});
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'SW_UPDATED') showSWBanner();
      });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectSWBanner);
  } else {
    injectSWBanner();
  }
})();
</script>

@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.mobile-nav{display:none}
@media(max-width:640px){
  /* App-like full width */
  .app-content{padding:10px 10px 0!important}
  .app-header-inner{padding:0 12px!important}
  /* Prevent table from going under FAB buttons on the right */
  table{max-width:calc(100vw - 76px)!important}
  #finn-fab-stack{right:8px!important}
  /* Show bottom nav, hide top tabs */
  .mobile-nav{display:flex!important}
  .tabs{display:none!important}
  /* Compact KPI cards */
  .kpi-grid{gap:8px!important;margin-bottom:10px!important}
  .kpi-card{padding:11px 13px!important}
  .kpi-card .kpi-label{font-size:9px!important}
  .kpi-card .kpi-value{font-size:17px!important}
  /* Compact ALL cards on mobile */
  .sec-card{padding:14px!important}
  /* Tighter section grids */
  .score-grid,.prev-grid,.cat-grid{gap:10px!important;margin-bottom:10px!important}
  /* Hide subtitle */
  .header-subtitle{display:none!important}
  /* Compact header controls */
  .header-controls{gap:5px!important}
  .view-toggle button{padding:5px 7px!important;font-size:10px!important}
  /* Smaller section titles */
  .sec-title-m{font-size:10px!important;margin-bottom:8px!important}
  /* ── Transaction card layout ── */
  table thead{display:none!important}
  table{display:block!important;max-width:100%!important}
  table tbody{display:block!important}
  table tr{display:grid!important;grid-template-columns:1fr auto auto!important;grid-template-rows:auto auto!important;padding:11px 14px!important;border-bottom:1px solid #E8ECF2!important;gap:0 6px!important;align-items:center!important;background:transparent!important}
  table tr:last-child{border-bottom:none!important}
  table tr:hover{background:#F8FAFF!important}
  table td{padding:0!important;border:none!important;display:block!important;background:transparent!important}
  table td:nth-child(1){grid-column:1!important;grid-row:2!important;font-size:11px!important;color:#94A3B8!important;margin-top:3px!important;white-space:nowrap!important}
  table td:nth-child(2){grid-column:1!important;grid-row:1!important;font-size:14px!important;font-weight:600!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important;max-width:calc(100vw - 140px)!important}
  table td:nth-child(3),table td:nth-child(4),table td:nth-child(5){display:none!important}
  table td:nth-child(6){grid-column:2!important;grid-row:1/3!important;display:flex!important;align-items:center!important;font-size:15px!important;font-weight:800!important;white-space:nowrap!important;padding:0 4px!important}
  table td:nth-child(7){grid-column:3!important;grid-row:1/3!important;display:flex!important;align-items:center!important;justify-content:center!important}
}

<!-- ===== FINN WHATSAPP INTEGRATION ===== -->
<script>
(function(){
  'use strict';
  const WA_KEY = 'fiq_wa_config';

  const store = {
    getWa:      () => { try { return JSON.parse(localStorage.getItem(WA_KEY)); } catch(e) { return null; } },
    saveWa:     v  => { try { localStorage.setItem(WA_KEY, JSON.stringify(v)); } catch(e) {} },
    getProfiles:() => { try { return JSON.parse(localStorage.getItem('fiq_profiles') || '[]'); } catch(e) { return []; } },
    getData:    id => { try { const d = localStorage.getItem('fiq_data_' + id); return d ? JSON.parse(d) : {txs:[],limits:{},goals:[]}; } catch(e) { return {txs:[],limits:{},goals:[]}; } },
    getFixed:   id => { try { return JSON.parse(localStorage.getItem('fiq_fixed_' + id) || '[]'); } catch(e) { return []; } },
  };

  const DEFAULT_LIMITS = {Alimentacao:500,Transporte:150,Saude:200,Lazer:200,Educacao:700,Moradia:1200,Vestuario:300,Investimento:500,Salario:0,Outros:500};

  function fmt(v) {
    return new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'}).format(v || 0);
  }

  function mesAtual(txs) {
    const n = new Date(), y = n.getFullYear(), m = n.getMonth();
    return (txs || []).filter(function(tx) {
      const d = new Date(tx.date); return d.getFullYear() === y && d.getMonth() === m;
    });
  }

  function activeProfileId() {
    const p = store.getProfiles();
    return p.length ? p[0].id : null;
  }

  function gerarResumoMensal(pid) {
    const data = store.getData(pid);
    const lim = Object.assign({}, DEFAULT_LIMITS, data.limits || {});
    const mes = mesAtual(data.txs);
    const nomeMes = new Date().toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
    let rec = 0, desp = 0;
    const cats = {};
    mes.forEach(function(tx) {
      if (tx.val > 0) { rec += tx.val; }
      else { desp += Math.abs(tx.val); const c = tx.cat || 'Outros'; cats[c] = (cats[c] || 0) + Math.abs(tx.val); }
    });
    const saldo = rec - desp;
    let msg = '*RESUMO FINANCEIRO — ' + nomeMes.toUpperCase() + '*\n\n';
    msg += '💰 Receitas: *' + fmt(rec) + '*\n💸 Despesas: *' + fmt(desp) + '*\n';
    msg += (saldo >= 0 ? '' : '') + ' Saldo: *' + fmt(saldo) + '*\n\n';
    const top = Object.entries(cats).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
    if (top.length) {
      msg += '*📂 Gastos por Categoria:*\n';
      top.forEach(function(entry) {
        const c = entry[0], v = entry[1];
        const l = lim[c];
        const pct = l && l > 0 ? ' (' + Math.round(v / l * 100) + '% do limite)' : '';
        msg += '• ' + c + ': *' + fmt(v) + '*' + pct + '\n';
      });
    }
    return msg + '\n— Finn. Controle Financeiro';
  }

  function gerarAlertas(pid) {
    const data = store.getData(pid);
    const lim = Object.assign({}, DEFAULT_LIMITS, data.limits || {});
    const mes = mesAtual(data.txs);
    const gastos = {};
    mes.forEach(function(tx) {
      if (tx.val < 0) { const c = tx.cat || 'Outros'; gastos[c] = (gastos[c] || 0) + Math.abs(tx.val); }
    });
    const estourados = [], proximos = [];
    Object.entries(gastos).forEach(function(entry) {
      const c = entry[0], g = entry[1];
      const l = lim[c];
      if (!l || l <= 0) return;
      const pct = g / l;
      if (pct >= 1) estourados.push({c:c,g:g,l:l,pct:pct});
      else if (pct >= 0.8) proximos.push({c:c,g:g,l:l,pct:pct});
    });
    if (!estourados.length && !proximos.length)
      return ' *LIMITES EM DIA!*\n\nTodos os limites estão controlados este mês.\n\n— Finn.';
    let msg = '🔔 *ALERTAS DE LIMITE*\n📅 ' + new Date().toLocaleDateString('pt-BR') + '\n\n';
    if (estourados.length) {
      msg += '* Limites Estourados (' + estourados.length + '):*\n';
      estourados.forEach(function(x) { msg += '• ' + x.c + ': ' + fmt(x.g) + ' de ' + fmt(x.l) + ' (' + Math.round(x.pct*100) + '%)\n'; });
      msg += '\n';
    }
    if (proximos.length) {
      msg += '* Próximos do Limite (' + proximos.length + '):*\n';
      proximos.forEach(function(x) { msg += '• ' + x.c + ': ' + fmt(x.g) + ' de ' + fmt(x.l) + ' (' + Math.round(x.pct*100) + '%)\n'; });
    }
    return msg + '\n— Finn.';
  }

  function gerarMetas(pid) {
    const data = store.getData(pid);
    const goals = data.goals || [];
    if (!goals.length) return '🎯 *METAS*\n\nNenhuma meta cadastrada ainda.\n\n— Finn.';
    let msg = '🎯 *STATUS DAS METAS*\n📅 ' + new Date().toLocaleDateString('pt-BR') + '\n\n';
    goals.forEach(function(g) {
      const saved = parseFloat(g.saved) || 0;
      const target = parseFloat(g.target) || 1;
      const pct = Math.min(100, Math.round(saved / target * 100));
      const filled = Math.round(pct / 10);
      const bar = '█'.repeat(filled) + '░'.repeat(10 - filled);
      msg += (g.emoji || '🎯') + ' *' + g.name + '*\n   ' + bar + ' ' + pct + '%\n   ' + fmt(saved) + ' de ' + fmt(target) + '\n';
      if (g.deadline) {
        const days = Math.ceil((new Date(g.deadline) - new Date()) / 86400000);
        msg += days > 0 ? '   📅 ' + days + ' dias restantes\n' : '    Prazo vencido!\n';
      }
      msg += '\n';
    });
    return msg + '— Finn.';
  }

  function gerarFixas(pid) {
    const fixas = store.getFixed(pid);
    if (!fixas.length) return '📆 *CONTAS FIXAS*\n\nNenhuma conta fixa cadastrada.\n\n— Finn.';
    const hoje = new Date().getDate();
    const pendentes = fixas.filter(function(f) { return !f.dueDay || f.dueDay >= hoje; })
                           .sort(function(a,b) { return (a.dueDay||99)-(b.dueDay||99); });
    const total = pendentes.reduce(function(s,f) { return s + (parseFloat(f.valor || f.value || 0)); }, 0);
    let msg = '📆 *CONTAS FIXAS PENDENTES*\n📅 ' + new Date().toLocaleDateString('pt-BR') + '\n\nTotal: *' + fmt(total) + '*\n\n';
    pendentes.slice(0,10).forEach(function(f) {
      const dia = f.dueDay ? 'dia ' + f.dueDay : 'em breve';
      msg += '• ' + (f.nome || f.name || f.desc || '?') + ': *' + fmt(parseFloat(f.valor || f.value || 0)) + '* (' + dia + ')\n';
    });
    if (pendentes.length > 10) msg += '_...e mais ' + (pendentes.length - 10) + '_\n';
    return msg + '\n— Finn.';
  }

  function abrirWhatsApp(numero, msg) {
    window.open('https://wa.me/' + numero + '?text=' + encodeURIComponent(msg), '_blank', 'noopener,noreferrer');
  }

  // ---- CSS ----
  var CSS = [
    '#fw-btn{position:fixed;bottom:22px;right:22px;z-index:9998;width:52px;height:52px;border-radius:50%;background:#25D366;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(37,211,102,.55);display:flex;align-items:center;justify-content:center;transition:transform .18s,box-shadow .18s}',
    '#fw-btn:hover{transform:scale(1.1);box-shadow:0 6px 26px rgba(37,211,102,.65)}',
    '#fw-ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:none;align-items:flex-end;justify-content:flex-end;padding:20px}',
    '#fw-ovl.open{display:flex}',
    '#fw-panel{background:#fff;border-radius:18px;width:min(370px,100%);box-shadow:0 20px 60px rgba(0,0,0,.22);overflow:hidden;animation:fwIn .22s ease;font-family:"Plus Jakarta Sans",sans-serif}',
    '@keyframes fwIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}',
    '.fw-head{background:linear-gradient(135deg,#128C7E,#25D366);color:#fff;padding:18px 18px 14px;display:flex;justify-content:space-between;align-items:flex-start}',
    '.fw-head h3{font-size:15px;font-weight:800;margin:0}',
    '.fw-head p{font-size:11.5px;margin:3px 0 0;opacity:.85}',
    '.fw-close{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:13px;line-height:1;flex-shrink:0}',
    '.fw-body{padding:14px}',
    '.fw-field{margin-bottom:10px}',
    '.fw-field label{font-size:11px;font-weight:700;color:#475569;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}',
    '.fw-field input{width:100%;padding:9px 11px;border:1.5px solid #E2E8F0;border-radius:9px;font-size:13.5px;font-family:inherit;transition:border-color .15s,box-shadow .15s}',
    '.fw-field input:focus{outline:none;border-color:#25D366;box-shadow:0 0 0 3px rgba(37,211,102,.15)}',
    '.fw-save{width:100%;padding:11px;background:#25D366;color:#fff;border:none;border-radius:9px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:2px}',
    '.fw-save:hover{background:#1ebe57}',
    '.fw-actions{display:flex;flex-direction:column;gap:7px}',
    '.fw-act{display:flex;align-items:center;gap:11px;padding:12px 13px;border:1.5px solid #E2E8F0;border-radius:11px;background:#fff;cursor:pointer;text-align:left;transition:all .14s;font-family:inherit;width:100%}',
    '.fw-act:hover{border-color:#25D366;background:#f0fff5}',
    '.fw-act .fi{width:32px;height:32px;min-width:32px;border-radius:8px;background:#F1F5F9;font-size:10px;font-weight:800;color:#475569;display:flex;align-items:center;justify-content:center;letter-spacing:-.02em}',
    '.fw-act .fl{font-size:13px;font-weight:700;color:#1E293B;display:block}',
    '.fw-act .fs{font-size:11px;color:#94A3B8;display:block;margin-top:1px}',
    '.fw-foot{padding:10px 14px;border-top:1px solid #E8ECF2;display:flex;justify-content:space-between;align-items:center}',
    '.fw-foot span{font-size:11px;color:#94A3B8}',
    '.fw-foot button{font-size:11px;color:#F97316;background:none;border:none;cursor:pointer;font-weight:600;font-family:inherit}',
    '.fw-ok{font-size:12px;color:#16a34a;font-weight:600;text-align:center;padding:6px 0;animation:fwIn .2s ease}',
  ].join('');

  var WA_SVG = '<svg viewBox="0 0 24 24" width="24" height="24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>';

  function injectCSS() {
    var s = document.createElement('style');
    s.textContent = CSS;
    document.head.appendChild(s);
  }

  function buildDOM() {
    var btn = document.createElement('button');
    btn.id = 'fw-btn';
    btn.title = 'WhatsApp Finn.';
    btn.innerHTML = WA_SVG;
    document.body.appendChild(btn);

    var ovl = document.createElement('div');
    ovl.id = 'fw-ovl';
    ovl.innerHTML = '<div id="fw-panel">'
      + '<div class="fw-head"><div><h3>WhatsApp</h3><p id="fw-sub">Envie relatórios pelo WhatsApp</p></div>'
      + '<button class="fw-close" id="fw-close-btn">✕</button></div>'
      + '<div class="fw-body" id="fw-body"></div>'
      + '<div class="fw-foot"><span>Abre o WhatsApp com a mensagem pronta</span>'
      + '<button id="fw-trocar">Trocar número</button></div></div>';
    document.body.appendChild(ovl);

    document.getElementById('fw-close-btn').addEventListener('click', function() {
      ovl.classList.remove('open');
    });
    document.getElementById('fw-trocar').addEventListener('click', function() {
      fwShowSetup();
    });
    ovl.addEventListener('click', function(e) {
      if (e.target === ovl) ovl.classList.remove('open');
    });
    btn.addEventListener('click', function() {
      ovl.classList.add('open');
      fwRender();
    });
  }

  function fwShowSetup() {
    var c = store.getWa() || {};
    document.getElementById('fw-sub').textContent = 'Configure seu número';
    document.getElementById('fw-trocar').style.display = 'none';
    document.getElementById('fw-body').innerHTML =
      '<div>'
      + '<p style="font-size:12.5px;color:#475569;margin-bottom:12px">Configure o número para receber os relatórios. O código +55 (Brasil) é adicionado automaticamente.</p>'
      + '<div class="fw-field"><label>Número com DDD</label>'
      + '<input type="tel" id="fw-num" placeholder="11 99999-9999" value="' + (c.exibicao || '') + '" maxlength="20"></div>'
      + '<div class="fw-field"><label>Apelido <span style="font-weight:400;text-transform:none">(opcional)</span></label>'
      + '<input type="text" id="fw-nome" placeholder="Ex: Meu celular" value="' + (c.nome || '') + '" maxlength="60"></div>'
      + '<button class="fw-save" id="fw-save-btn">Salvar e continuar →</button>'
      + '</div>';
    document.getElementById('fw-save-btn').addEventListener('click', fwSave);
  }

  function fwSave() {
    var raw = document.getElementById('fw-num').value.trim();
    var digits = raw.replace(/\D/g, '');
    var nome = document.getElementById('fw-nome').value.trim();
    if (digits.length < 10) {
      document.getElementById('fw-num').style.borderColor = '#e74c3c';
      return;
    }
    var numero = digits.startsWith('55') ? digits : '55' + digits;
    store.saveWa({numero: numero, nome: nome, exibicao: raw});
    fwRender();
  }

  var _fwActs = [];
  var _fwNum = '';

  function fwRender() {
    var c = store.getWa();
    if (!c || !c.numero) { fwShowSetup(); return; }
    document.getElementById('fw-sub').textContent = c.nome || ('+' + c.numero);
    document.getElementById('fw-trocar').style.display = '';
    var pid = activeProfileId();
    _fwActs = [
      {icon:'SM', label:'Resumo do Mês',    sub:'Receitas, despesas e saldo atual',    fn: function(){ return gerarResumoMensal(pid); }},
      {icon:'AL', label:'Alertas de Limite', sub:'Categorias estouradas ou próximas',  fn: function(){ return gerarAlertas(pid); }},
      {icon:'MT', label:'Status das Metas', sub:'Progresso de cada meta',             fn: function(){ return gerarMetas(pid); }},
      {icon:'FX', label:'Contas Fixas',     sub:'Pendências do mês atual',            fn: function(){ return gerarFixas(pid); }},
    ];
    _fwNum = c.numero;
    var btns = _fwActs.map(function(a, i) {
      return '<button class="fw-act" data-idx="' + i + '">'
        + '<span class="fi">' + a.icon + '</span>'
        + '<span><span class="fl">' + a.label + '</span><span class="fs">' + a.sub + '</span></span>'
        + '<span style="margin-left:auto;font-size:17px;color:#25D366">›</span>'
        + '</button>';

  function processPDF(file) {
    var status = document.getElementById('fp-pdf-status');
    var preview = document.getElementById('fp-pdf-preview');
    status.textContent = 'Carregando PDF...';
    preview.innerHTML = '';
    if (!window.pdfjsLib) {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = function(){
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        readPDF(file);
      };
      s.onerror = function(){ status.textContent = 'Erro ao carregar leitor. Verifique sua conexão.'; };
      document.head.appendChild(s);
    } else { readPDF(file); }
  }

  function readPDF(file) {
    var status = document.getElementById('fp-pdf-status');
    status.textContent = 'Lendo PDF...';
    var reader = new FileReader();
    reader.onload = function(e) {
      window.pdfjsLib.getDocument(new Uint8Array(e.target.result)).promise
        .then(function(pdf){
          status.textContent = 'Extraindo texto de '+pdf.numPages+' página(s)...';
          return extractPages(pdf, 1, []);
        })
        .then(function(lines){
          var txs = parseBankLines(lines);
          showPDFPreview(txs, lines);
        })
        .catch(function(err){ status.textContent = 'Erro ao ler PDF: '+err.message; });
    };
    reader.readAsArrayBuffer(file);
  }

  function extractPages(pdf, n, acc) {
    if (n > pdf.numPages) return Promise.resolve(acc);
    return pdf.getPage(n).then(function(page){ return page.getTextContent(); })
      .then(function(content){
        var rows = {};
        content.items.forEach(function(item){
          var y = Math.round(item.transform[5]);
          rows[y] = (rows[y]||[]);
          rows[y].push(item.str);
        });
        var lines = Object.keys(rows).sort(function(a,b){return b-a;})
          .map(function(y){ return rows[y].join(' ').replace(/\s+/g,' ').trim(); })
          .filter(Boolean);
        return extractPages(pdf, n+1, acc.concat(lines));
      });
  }

  function parseBankLines(lines) {
    var txs = [], seen = {};
    var skip = /^(saldo|total|subtotal|anterior|rendim|imposto|iof|taxa|limite|fatura|pagamento\s+m|data\s|descri|valor\s|tipo\s|período|extrato|cliente|cpf|agência|conta\s)/i;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (skip.test(line)) continue;
      var m =
        line.match(/^(\d{2}\/\d{2}\/\d{2,4})\s+(.{3,80}?)\s+([-+]?[\d.]*\d+,\d{2})\s*$/) ||
        line.match(/^(\d{2}\/\d{2})\s+(.{3,80}?)\s+([-+]?[\d.]*\d+,\d{2})\s*$/) ||
        line.match(/^(\d{2}\/\d{2}\/\d{2,4})\s+(.{3,80}?)\s+([-+]?[\d.]*\d+,\d{2})\s+[-+]?[\d.]*\d+,\d{2}\s*$/);
      if (!m) continue;
      var date = pdfDate(m[1]), desc = m[2].replace(/\s+/g,' ').trim(), val = pdfVal(m[3]);
      if (!date || !desc || val === null) continue;
      var key = date+'|'+desc+'|'+val;
      if (seen[key]) continue;
      seen[key] = 1;
      txs.push({ id:'pdf_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), date:date, desc:desc, val:val, cat:pdfCateg(desc), source:'pdf' });
    }
    return txs;
  }

  function pdfDate(str) {
    var p = str.split('/');
    if (p.length < 2) return null;
    var y = p[2] ? (p[2].length===2?'20'+p[2]:p[2]) : String(new Date().getFullYear());
    return y+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
  }
  function pdfVal(str) {
    var v = parseFloat(str.replace(/\./g,'').replace(',','.'));
    return isNaN(v) ? null : v;
  }
  function pdfCateg(d) {
    if (/ifood|rappi|delivery|restaur|hambur|pizza|sushi|padaria|mercad|carref|pão de açúcar|superm/i.test(d)) return 'Alimentacao';
    if (/uber|99pop|taxi|ônibus|metrô|combustível|gasolina|posto|estacion|pedágio/i.test(d)) return 'Transporte';
    if (/farmá|medic|consul|clíni|hospital|plano.*saúde|unimed|hapvida|drogaria/i.test(d)) return 'Saude';
    if (/netflix|spotify|steam|prime|cinemark|ingresso|lazer/i.test(d)) return 'Lazer';
    if (/escola|facul|curso|livro|udemy|educação/i.test(d)) return 'Educacao';
    if (/aluguel|condomín|iptu|energia|água|gás|claro|vivo|tim\b|oi\b|internet/i.test(d)) return 'Moradia';
    if (/roupa|camiseta|calça|sapato|tênis|zara|renner|c&a|hm\b|forever/i.test(d)) return 'Vestuario';
    if (/investim|cdb|tesouro|ação|fundo|xp\b|btg|nuinvest/i.test(d)) return 'Investimento';
    if (/salário|pagamento|vencim|transferência.*receb|pix.*receb|crédito.*conta/i.test(d)) return 'Salario';
    return 'Outros';
  }

      + '<th style="padding:7px 8px;text-align:left;font-size:10px;color:#64748B;border-bottom:1px solid #E2E8F0">DESCRIÇÃO</th>'
      + '<th style="padding:7px 8px;text-align:right;font-size:10px;color:#64748B;border-bottom:1px solid #E2E8F0">VALOR</th>'

      if (!newTxs.length) { document.getElementById('fp-pdf-status').innerHTML = 'Todas as transações já existem.'; return; }
      data.txs = existing.concat(newTxs);
      localStorage.setItem('fiq_data_'+id, JSON.stringify(data));
      document.getElementById('fp-pdf-status').innerHTML = '<strong>'+newTxs.length+' transações importadas!</strong>';
      document.getElementById('fp-pdf-preview').innerHTML = '<div class="fp-result fp-good" style="text-align:center">'+newTxs.length+' transações adicionadas!<br><br>'
        + '<button class="fp-btn fp-btn-primary" onclick="location.reload()" style="font-size:12px">Recarregar app</button></div>';
    });

  // ── REGRA 50/30/20 ────────────────────────────────────────────────────
  function renderRegra(el) {
    const id = pid();
    const {txs} = STORE.getData(id);
    const mes = mesAtual(txs);
    let rec = 0; const cats = {};
    mes.forEach(function(tx){
      if(tx.val>0) rec+=tx.val;
      else { const c=tx.cat||'Outros'; cats[c]=(cats[c]||0)+Math.abs(tx.val); }
    });
    if (rec <= 0) {
      el.innerHTML = '<div class="fp-result" style="text-align:center;padding:18px"><span class="fp-warn">Sem receitas no mês.<br>Registre sua renda para usar esta ferramenta.</span></div>';
      return;
    }
    function sum(cs){return cs.reduce(function(s,c){return s+(cats[c]||0);},0);}
    const needs = sum(['Alimentacao','Saude','Moradia','Transporte']);
    const wants = sum(['Lazer','Vestuario','Educacao','Outros']);
    const saves = sum(['Investimento']);
    function pct(v){return rec>0?Math.round(v/rec*100):0;}
    function row(label,val,ideal,color){
      const p=pct(val), w=Math.min(100,Math.round(p/ideal*100));
      return '<div style="margin-bottom:14px">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
        + '<span style="font-size:12.5px;font-weight:600">'+label+'</span>'
        + '<span style="font-size:12px;font-weight:700;color:'+(p<=ideal?'#16a34a':'#d97706')+'">'+p+'% <span style="color:#94A3B8;font-weight:400">/ ideal '+ideal+'%</span></span>'
        + '</div>'
        + '<div class="fp-bar-wrap"><div class="fp-bar" style="width:'+w+'%;background:'+color+'"></div></div>'
        + '<div style="font-size:11px;color:#64748B;display:flex;justify-content:space-between"><span>'+BRL(val)+'</span><span>ideal: '+BRL(rec*ideal/100)+'</span></div>'
        + '</div>';
    }
    el.innerHTML = '<div class="fp-result">'
      + '<div style="margin-bottom:14px;font-size:12.5px;color:#475569">Renda do mês: <strong>'+BRL(rec)+'</strong></div>'
      + row('Necessidades (moradia, alimentação, saúde, transporte)', needs, 50, '#3B82F6')
      + row('Desejos (lazer, roupa, educação, outros)', wants, 30, '#A855F7')
      + row('Poupança / Investimentos', saves, 20, '#10B981')
      + '<hr style="border:none;border-top:1px solid #E2E8F0;margin:10px 0">'
      + '<div style="font-size:11.5px;color:#64748B">Não categorizado: <strong>'+BRL(Math.max(0,rec-needs-wants-saves))+'</strong></div>'
      + '</div>';
  }

  function calcJuros() {
    const inicial = parseFloat(document.getElementById('fp-j-inicial').value)||0;
    const aporte  = parseFloat(document.getElementById('fp-j-aporte').value)||0;
    const taxa    = parseFloat(document.getElementById('fp-j-taxa').value)||0;
    const meses   = parseInt(document.getElementById('fp-j-meses').value)||0;
    const r = document.getElementById('fp-j-result');
    if(!taxa||!meses){r.innerHTML='<div class="fp-result fp-warn">Preencha taxa e período.</div>';return;}
    const t=taxa/100;
    let montante=inicial;
    for(let i=0;i<meses;i++){montante=montante*(1+t)+aporte;}
    const aportado=inicial+aporte*meses;
    const ganhos=montante-aportado;
    r.innerHTML = '<div class="fp-result">'
      + '<div class="fp-highlight">'+BRL(montante)+'</div>'
      + '<div style="font-size:12px;color:#64748B;margin-bottom:12px">Montante em '+meses+' meses ('+((meses/12).toFixed(1))+' anos)</div>'
      + '<div style="margin-bottom:5px">Total investido: <strong>'+BRL(aportado)+'</strong></div>'
      + '<div style="margin-bottom:5px">Juros ganhos: <strong class="fp-good">'+BRL(ganhos)+'</strong></div>'
      + '<div style="margin-bottom:5px">Rendimento: <strong class="fp-good">+'+((ganhos/Math.max(1,aportado)*100).toFixed(1))+'%</strong></div>'
      + '<hr style="border:none;border-top:1px solid #E2E8F0;margin:10px 0">'
      + '<div style="font-size:11.5px;color:#64748B">'+BRL(ganhos)+' vieram dos juros compostos — o dinheiro trabalhando por você.</div>'
      + '</div>';
  }

  function exportCSV() {
    const id = pid();
    const {txs} = STORE.getData(id);
    const r = document.getElementById('fp-export-result');
    if (!txs || !txs.length) {
      r.innerHTML = '<div class="fp-result fp-warn">Nenhuma transação encontrada. Certifique-se de estar logado no Finn.</div>';
      return;
    }
    const header = 'Data,Descricao,Valor,Categoria,Tipo';
    const rows = txs.map(function(tx){
      const tipo = tx.val > 0 ? 'Receita' : 'Despesa';
      const desc = (tx.desc||'').replace(/"/g,'""');
      return '"'+tx.date+'","'+desc+'","'+Math.abs(tx.val).toFixed(2).replace('.',',')+'","'+(tx.cat||'')+'","'+tipo+'"';
    });
    const csv = '﻿'+[header].concat(rows).join('\r\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='finn_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
    URL.revokeObjectURL(url);
    r.innerHTML = '<div class="fp-result fp-good">'+txs.length+' transações exportadas!</div>';
  }

  // ── PREVISÃO DE SALDO ─────────────────────────────────────────────────
  function renderPreview(el) {
    const id = pid();
    const {txs} = STORE.getData(id);
    const mes = mesAtual(txs);
    const hoje = new Date();
    const diasNoMes = new Date(hoje.getFullYear(), hoje.getMonth()+1, 0).getDate();
    const diaAtual = hoje.getDate();
    const diasRestantes = diasNoMes - diaAtual;

    let rec = 0, desp = 0;
    mes.forEach(function(tx){ if(tx.val>0) rec+=tx.val; else desp+=Math.abs(tx.val); });
    const saldoAtual = rec - desp;
    const mediaDesp = diaAtual > 0 ? desp / diaAtual : 0;
    const despPrev = mediaDesp * diasRestantes;
    const saldoPrev = saldoAtual - despPrev;

    const cor = saldoPrev >= 0 ? 'fp-good' : 'fp-bad';
    const emoji = '';

    el.innerHTML = '<div class="fp-result">'
      + '<div style="margin-bottom:10px"><strong>Hoje:</strong> dia '+diaAtual+' de '+diasNoMes+' ('+diasRestantes+' dias restantes)</div>'

  function renderPanico(el) {

  function calcPanico() {
    const id = pid();
    const {txs} = STORE.getData(id);
    const mes = mesAtual(txs);
    const hoje = new Date();
    const diasNoMes = new Date(hoje.getFullYear(), hoje.getMonth()+1, 0).getDate();
    const diasRestantes = diasNoMes - hoje.getDate();

    let rec = 0, desp = 0;
    mes.forEach(function(tx){ if(tx.val>0) rec+=tx.val; else desp+=Math.abs(tx.val); });
    const saldoAtual = rec - desp;

    const r = document.getElementById('fp-panico-result');
    if (diasRestantes <= 0) {
      r.innerHTML = '<div class="fp-result"><strong>O mês acabou!</strong> Aguarde o próximo mês.</div>';
      return;
    }
    if (saldoAtual <= 0) {
      r.innerHTML = '<div class="fp-panic-active"><div>MODO CONTROLE</div><div class="daily">R$ 0,00</div><p>Seu saldo já está negativo. Foque em recuperação!</p></div>';
      return;
    }
    const diaria = saldoAtual / diasRestantes;
    r.innerHTML = '<div class="fp-panic-active">'
      + '<div>MODO CONTROLE ATIVO</div>'
      + '<div class="daily">'+BRL(diaria)+'/dia</div>'
      + '<p>Esse é o seu limite diário pelos próximos <strong>'+diasRestantes+' dias</strong> para fechar o mês no zero.</p>'
      + '<p style="margin-top:6px;font-size:11px">Saldo atual: '+BRL(saldoAtual)+' ÷ '+diasRestantes+' dias</p>'
      + '</div>';
  }

  function renderPosso(el) {
    el.innerHTML = '<label class="fp-label">Valor do item (R$)</label>'
      + '<input type="number" class="fp-input" id="fp-posso-valor" placeholder="Ex: 2500" min="0" step="0.01">'

      + '<button class="fp-btn fp-btn-primary" id="fp-posso-btn" style="width:100%">Analisar</button>'
      + '<div id="fp-posso-result"></div>';
    document.getElementById('fp-posso-btn').addEventListener('click', calcPosso);

  function calcPosso() {
    const valor = parseFloat(document.getElementById('fp-posso-valor').value) || 0;
    const parcelas = parseInt(document.getElementById('fp-posso-parcelas').value) || 1;
    if (!valor || valor <= 0) {
      document.getElementById('fp-posso-result').innerHTML = '<div class="fp-result fp-bad">Informe o valor do item.</div>';
      return;
    }

    const id = pid();
    const {txs, limits} = STORE.getData(id);
    const lim = Object.assign({}, DEFAULT_LIMITS, limits||{});
    const mes = mesAtual(txs);
    let rec = 0, desp = 0;
    mes.forEach(function(tx){ if(tx.val>0) rec+=tx.val; else desp+=Math.abs(tx.val); });
    const saldoAtual = rec - desp;
    const limiteOutros = lim.Outros || 500;
    const parcela = valor / parcelas;
    const impactoMensal = parcelas > 1 ? ((parcela / limiteOutros) * 100).toFixed(0) : null;

    let html = '<div class="fp-result">';
    html += '<div style="margin-bottom:8px"><strong>'+BRL(valor)+'</strong>';
    if (parcelas > 1) html += ' em <strong>'+parcelas+'x</strong> de <strong>'+BRL(parcela)+'</strong>';
    else html += ' à vista';
    html += '</div>';

    if (parcelas === 1) {
      const saldoApos = saldoAtual - valor;
      const mesesReserva = rec > 0 ? (saldoApos / rec).toFixed(1) : '0';
      const cor = saldoApos >= 0 ? 'fp-good' : 'fp-bad';
      html += '<div class="'+cor+'" style="margin-bottom:6px">'+''+' Saldo após compra: <strong>'+BRL(saldoApos)+'</strong></div>';
      if (parseFloat(mesesReserva) < 1) html += '<div class="fp-bad">Reserva cairia para menos de 1 mês de renda.</div>';
      else if (parseFloat(mesesReserva) < 3) html += '<div class="fp-warn">Reserva de '+mesesReserva+' meses — abaixo do recomendado (3 meses).</div>';
      else html += '<div class="fp-good">Reserva de '+mesesReserva+' meses — saudável.</div>';
    } else {
      html += '<div style="margin-bottom:6px">Impacto mensal: <strong>'+BRL(parcela)+'</strong> nos seus gastos</div>';
      if (impactoMensal) html += '<div class="'+(parseFloat(impactoMensal)>30?'fp-bad':parseFloat(impactoMensal)>15?'fp-warn':'fp-good')+'" style="margin-bottom:6px">';
      html += 'Representa <strong>'+impactoMensal+'%</strong> do seu limite de lazer/outros.</div>';
    }

    // Recomendação
    const pode = parcelas===1 ? saldoAtual >= valor : parcela <= limiteOutros * 0.3;
    html += '<hr style="border:none;border-top:1px solid #E2E8F0;margin:10px 0">';
    html += '<div style="font-weight:700;font-size:13px">';
    if (pode) html += '<span class="fp-good">Parece viável.</span> Mas avalie se é prioridade.';
    else if (parcelas===1) html += '<span class="fp-warn">Considere parcelar ou esperar acumular mais saldo.</span>';
    else html += '<span class="fp-warn">Parcela alta em relação ao seu orçamento. Considere um prazo menor.</span>';
    html += '</div></div>';

    document.getElementById('fp-posso-result').innerHTML = html;
  }

  window._fDebt = function(i, k, v) { if(debts[i]) { debts[i][k]=v; STORE.set('finn_debts', debts); } };
  window._fDelDebt = function(i) { debts.splice(i,1); STORE.set('finn_debts', debts); renderDebtList(); };

  function simDebt(sortedDebts, extra) {
    var ds = sortedDebts.map(function(d){ return {nome:d.nome,saldo:+d.saldo,juros:+d.juros/100/12,minimo:+d.minimo}; });
    var mes=0, totalJuros=0;
    while (ds.some(function(d){return d.saldo>0;}) && mes<360) {
      mes++;
      var sobra = extra;
      ds.forEach(function(d){ if(d.saldo<=0) return; var j=d.saldo*d.juros; totalJuros+=j; d.saldo+=j; var pg=Math.min(d.saldo, d.minimo); d.saldo-=pg; sobra-=pg; });
      // Apply extra to first debt with balance
      for (var i=0; i<ds.length; i++) {
        if(ds[i].saldo>0 && sobra>0){ var pg=Math.min(ds[i].saldo,sobra); ds[i].saldo-=pg; sobra-=pg; }
      }
      ds.forEach(function(d){ if(d.saldo<0.01) d.saldo=0; });
    }
    return {meses:mes, juros:totalJuros};
  }

  function calcDebts() {
    const extra = parseFloat(document.getElementById('fp-debt-extra').value) || 0;
    const valid = debts.filter(function(d){ return d.saldo>0 && d.minimo>0; });
    const r = document.getElementById('fp-debt-result');
    if (!valid.length) { r.innerHTML='<div class="fp-result fp-warn">Adicione ao menos uma dívida com saldo e pagamento mínimo.</div>'; return; }

    const snowball = simDebt([].concat(valid).sort(function(a,b){ return a.saldo-b.saldo; }), extra + valid.reduce(function(s,d){return s+d.minimo;},0));
    const avalanche = simDebt([].concat(valid).sort(function(a,b){ return b.juros-a.juros; }), extra + valid.reduce(function(s,d){return s+d.minimo;},0));
    const melhor = avalanche.juros <= snowball.juros ? 'avalanche' : 'snowball';

    r.innerHTML = '<div class="fp-result">'
      + '<div style="font-weight:700;margin-bottom:10px">Comparativo de Métodos</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'
      + '<div style="background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:8px;padding:10px;text-align:center">'
      + '<div style="font-size:11px;font-weight:700;color:#92400E">BOLA DE NEVE</div>'
      + '<div style="font-size:16px;font-weight:800;color:#1E293B;margin:4px 0">'+snowball.meses+' meses</div>'
      + '<div style="font-size:11px;color:#64748B">Juros: '+BRL(snowball.juros)+'</div>'
      + '</div>'
      + '<div style="background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:8px;padding:10px;text-align:center">'
      + '<div style="font-size:11px;font-weight:700;color:#92400E">AVALANCHE</div>'
      + '<div style="font-size:16px;font-weight:800;color:#1E293B;margin:4px 0">'+avalanche.meses+' meses</div>'
      + '<div style="font-size:11px;color:#64748B">Juros: '+BRL(avalanche.juros)+'</div>'
      + '</div></div>'
      + '<div class="fp-good" style="font-size:12px">Recomendação: método <strong>'+(melhor==='avalanche'?'Avalanche (maiores juros primeiro)':'Bola de Neve (menores saldos primeiro)')+'</strong> — você economiza <strong>'+BRL(Math.abs(snowball.juros-avalanche.juros))+'</strong> em juros.</div>'
      + '</div>';
  }

  // ── CALENDÁRIO MENSAL ─────────────────────────────────────────────────
  function renderCalendario(el) {
    var today = new Date();
    var curYear = today.getFullYear();
    var curMonth = today.getMonth();

    function fmt2(n) { return String(n).padStart(2,'0'); }
    function fmtBRL(v) { return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Math.abs(v)); }

    function drawCalendar(y, m) {
      var data = STORE.getData(pid());
      var txs = data.txs || [];
      // Group txs by day string "DD" for this year/month
      var dayMap = {};
      txs.forEach(function(tx) {
        var raw = tx.date || '';
        // iOS safe parsing: append T12:00:00 to YYYY-MM-DD
        var d = raw.length === 10 ? new Date(raw + 'T12:00:00') : new Date(raw);
        if (isNaN(d)) return;
        if (d.getFullYear() !== y || d.getMonth() !== m) return;
        var key = fmt2(d.getDate());
        if (!dayMap[key]) dayMap[key] = [];
        dayMap[key].push(tx);
      });

      var monthName = new Date(y, m, 1).toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
      var firstDow = new Date(y, m, 1).getDay(); // 0=Sun
      var daysInMonth = new Date(y, m+1, 0).getDate();
      var todayDay = (today.getFullYear()===y && today.getMonth()===m) ? today.getDate() : 0;

      var DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

      var html = '<div class="fp-cal-nav">'
        + '<button class="fp-cal-nav-btn" id="fp-cal-prev">‹</button>'
        + '<div class="fp-cal-month">' + monthName.charAt(0).toUpperCase() + monthName.slice(1) + '</div>'
        + '<button class="fp-cal-nav-btn" id="fp-cal-next">›</button>'
        + '</div>'
        + '<div class="fp-cal-grid">'
        + DAYS.map(function(h){return '<div class="fp-cal-hdr">'+h+'</div>';}).join('')
        + '</div>'
        + '<div class="fp-cal-grid" id="fp-cal-days">';

      for (var i = 0; i < firstDow; i++) html += '<div class="fp-cal-day empty"></div>';

      for (var d = 1; d <= daysInMonth; d++) {
        var key = fmt2(d);
        var dtxs = dayMap[key] || [];
        var isToday = d === todayDay;
        var hasTx = dtxs.length > 0;
        var hasRec = dtxs.some(function(t){return t.val>0;});
        var hasDep = dtxs.some(function(t){return t.val<0;});
        var net = dtxs.reduce(function(s,t){return s+t.val;},0);
        html += '<div class="fp-cal-day'+(isToday?' today':'')+(hasTx?' has-tx':'')+'" data-d="'+key+'">'
          + '<span class="fp-cal-num">'+d+'</span>';
        if (hasRec) html += '<div class="fp-cal-dot r"></div>';
        if (hasDep) html += '<div class="fp-cal-dot d"></div>';
        if (hasTx) html += '<div class="fp-cal-val '+(net>=0?'p':'n')+'">'+fmtBRL(net)+'</div>';
        html += '</div>';
      }
      html += '</div><div id="fp-cal-detail"></div>';
      el.innerHTML = html;

      document.getElementById('fp-cal-prev').addEventListener('click', function() {
        var nm = m-1, ny = y; if(nm<0){nm=11;ny--;} drawCalendar(ny,nm);
      });
      document.getElementById('fp-cal-next').addEventListener('click', function() {
        var nm = m+1, ny = y; if(nm>11){nm=0;ny++;} drawCalendar(ny,nm);
      });

      function showDetail(key) {
        var dtxs = dayMap[key] || [];
        var detail = document.getElementById('fp-cal-detail');
        if (!detail) return;
        if (!dtxs.length) {
          detail.innerHTML = '<div class="fp-cal-empty">Sem lançamentos neste dia</div>';
          return;
        }
        var rows = dtxs.map(function(tx) {
          return '<div class="fp-cal-tx-row">'
            + '<span class="fp-cal-tx-desc">'+tx.desc+'</span>'
            + '<span style="font-weight:700;color:'+(tx.val>=0?'#059669':'#DC2626')+';flex-shrink:0">'+fmtBRL(tx.val)+'</span>'
            + '</div>';
        }).join('');
        detail.innerHTML = '<div class="fp-cal-detail">'+rows+'</div>';
      }

      document.querySelectorAll('#fp-cal-days .fp-cal-day:not(.empty)').forEach(function(dayEl) {
        dayEl.addEventListener('click', function() {
          document.querySelectorAll('#fp-cal-days .fp-cal-day').forEach(function(e){e.classList.remove('selected');});
          dayEl.classList.add('selected');
          showDetail(dayEl.getAttribute('data-d'));
        });
      });

      if (todayDay) {
        var todayEl = el.querySelector('[data-d="'+fmt2(todayDay)+'"]');
        if (todayEl) { todayEl.classList.add('selected'); showDetail(fmt2(todayDay)); }
      }
    }

    drawCalendar(curYear, curMonth);
  }

        if (!mTxs.length) mTxs = data.txs;

  function addExtratoPanels() {

    // ── HELPERS ─────────────────────────────────────────────────────────────

    function parseNum(s) { return parseFloat((s||'0').replace(/\./g,'').replace(',','.')) || 0; }

    // ── SVG CHARTS ──────────────────────────────────────────────────────────
    function hBar(items, width) {
      if (!items.length) return '';
      var mx = Math.max.apply(null, items.map(function(d){return Math.abs(d.value);})) || 1;
      var bh=22, gap=6, lw=92, tw = width - lw - 75;
      var h = items.length * (bh + gap);
      var svg = '<svg width="100%" height="'+h+'" viewBox="0 0 '+width+' '+h+'" xmlns="http://www.w3.org/2000/svg">';
      items.forEach(function(d, i) {
        var y = i*(bh+gap), w = Math.round(Math.abs(d.value)/mx*tw);
        svg += '<rect x="'+lw+'" y="'+y+'" width="'+w+'" height="'+bh+'" rx="4" fill="'+(d.color||'#F97316')+'" opacity="0.85"/>';
        svg += '<text x="'+(lw-5)+'" y="'+(y+bh/2+4)+'" fill="#64748B" font-size="10" text-anchor="end" font-family="inherit">'+(d.label||'').slice(0,12)+'</text>';
        svg += '<text x="'+(lw+w+5)+'" y="'+(y+bh/2+4)+'" fill="#94A3B8" font-size="10" font-family="inherit">'+fmtR(d.value)+'</text>';
      });
      return svg + '</svg>';
    }

    function donut(slices, sz) {
      var tot = slices.reduce(function(s,x){return s+x.value;},0);
      if (!tot) return '';
      var cx=sz/2, cy=sz/2, r=sz*0.42, ri=r*0.55;
      var svg = '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'" xmlns="http://www.w3.org/2000/svg">';
      var a = -Math.PI/2;
      slices.forEach(function(sl) {
        if (!sl.value) return;
        var da = sl.value/tot*2*Math.PI;
        var x1=cx+r*Math.cos(a), y1=cy+r*Math.sin(a);
        var x2=cx+r*Math.cos(a+da), y2=cy+r*Math.sin(a+da);
        var xi1=cx+ri*Math.cos(a+da), yi1=cy+ri*Math.sin(a+da);
        var xi2=cx+ri*Math.cos(a), yi2=cy+ri*Math.sin(a);
        var lg = da>Math.PI?1:0;
        svg += '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+lg+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' L'+xi1.toFixed(1)+','+yi1.toFixed(1)+' A'+ri+','+ri+' 0 '+lg+',0 '+xi2.toFixed(1)+','+yi2.toFixed(1)+' Z" fill="'+sl.color+'" stroke="#0F172A" stroke-width="1.5"/>';
        a += da;
      });
      return svg + '</svg>';
    }

    function lineChart(pts, w, h) {
      if (pts.length < 2) return '';
      var vs = pts.map(function(p){return p.v;}), pd=8;
      var mn=Math.min.apply(null,vs), mx=Math.max.apply(null,vs), rng=mx-mn||1;
      function sx(i){return pd+(i/(pts.length-1))*(w-pd*2);}
      function sy(v){return (h-pd)-((v-mn)/rng)*(h-pd*2);}
      var svg = '<svg width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">';
      if (mn<0&&mx>0) {
        var zy=sy(0).toFixed(1);
        svg += '<line x1="'+pd+'" y1="'+zy+'" x2="'+(w-pd)+'" y2="'+zy+'" stroke="#334155" stroke-dasharray="3,3"/>';
      }
      var coords = pts.map(function(p,i){return sx(i).toFixed(1)+','+sy(p.v).toFixed(1);}).join(' ');
      var base = sy(Math.max(mn,0)).toFixed(1);
      svg += '<polygon points="'+sx(0).toFixed(1)+','+base+' '+coords+' '+sx(pts.length-1).toFixed(1)+','+base+'" fill="#3B82F6" opacity="0.08"/>';
      svg += '<polyline points="'+coords+'" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linejoin="round"/>';
      pts.forEach(function(p,i){
        svg += '<circle cx="'+sx(i).toFixed(1)+'" cy="'+sy(p.v).toFixed(1)+'" r="3" fill="'+(p.v>=0?'#22C55E':'#EF4444')+'"/>';
      });
      return svg + '</svg>';
    }

    // ── CSV PARSER ──────────────────────────────────────────────────────────
    var CAT_COLORS = {Cartão:'#EF4444',PIX:'#3B82F6',Depósito:'#22C55E',Juros:'#F97316',IOF:'#A855F7',Estorno:'#10B981',Outros:'#64748B'};
    var PAL = ['#F97316','#3B82F6','#22C55E','#A855F7','#EF4444','#10B981','#F59E0B','#EC4899'];

    function parseCSV(text) {
      text = text.replace(/^﻿/,'');
      var lines = text.split(/\r?\n/), txs = [], hdr = true;
      lines.forEach(function(line) {
        if (hdr) { hdr=false; return; }
        var fields=[], cur='', inQ=false;
        for (var j=0;j<line.length;j++) {
          if (line[j]==='"') inQ=!inQ;
          else if (line[j]===',' && !inQ) { fields.push(cur.trim()); cur=''; }
          else cur+=line[j];
        }
        fields.push(cur.trim());
        if (fields.length<5) return;
        var date=fields[0], lanc=fields[1], det=fields[2], val=fields[4], tipo=(fields[5]||'').trim();
        if (!date.match(/\d{2}\/\d{2}\/\d{4}/)||date.startsWith('00')||!tipo) return;
        if (/rende\s*f[aá]cil/i.test(lanc)||/s\s*a\s*l\s*d\s*o/i.test(lanc)&&!tipo) return;
        var n = parseNum(val); if (!n) return;
        var cat='Outros';
        if (/cart[aã]o|compra/i.test(lanc)) cat='Cartão';
        else if (/pix/i.test(lanc)) cat='PIX';
        else if (/dep[^a]|dinheiro|atm/i.test(lanc)) cat='Depósito';
        else if (/juros/i.test(lanc)) cat='Juros';
        else if (/iof/i.test(lanc)) cat='IOF';
        else if (/estorno/i.test(lanc)) cat='Estorno';
        txs.push({date:date,lanc:lanc,det:det,val:n,tipo:tipo,cat:cat});
      });
      return txs;
    }

    // ── MULTI-FORMAT HELPERS ────────────────────────────────────────────────
    function loadScript(url, cb) {
      var s = document.createElement('script');
      s.src = url;
      s.onload = function(){ cb(null); };
      s.onerror = function(){ cb(new Error('Falha: '+url.split('/').pop())); };
      document.head.appendChild(s);
    }

    function splitFields(line, delim) {
      var fields=[], cur='', inQ=false;
      for (var j=0;j<line.length;j++) {
        if (line[j]==='"') inQ=!inQ;
        else if (line[j]===delim&&!inQ) { fields.push(cur.trim()); cur=''; }
        else cur+=line[j];
      }
      fields.push(cur.trim());
      return fields;
    }

    function parseText(text) {
      text = text.replace(/^﻿/,'');
      var lines = text.split(/\r?\n/).filter(function(l){return l.trim();});
      if (lines.length<2) return [];
      var s=lines[0];
      var tabs=(s.match(/\t/g)||[]).length, commas=(s.match(/,/g)||[]).length, semis=(s.match(/;/g)||[]).length;
      var delim=',';
      if (tabs>=commas&&tabs>=semis&&tabs>0) delim='\t';
      else if (semis>commas) delim=';';
      if (delim===',') return parseCSV(text);
      var txs=[], first=true;
      lines.forEach(function(line) {
        if (first){first=false;return;}
        var fields=splitFields(line,delim);
        if (fields.length<3) return;
        var date='',desc='',val=0;
        for (var i=0;i<fields.length;i++) {
          if (/^\d{2}\/\d{2}\/\d{4}$/.test(fields[i])){date=fields[i];break;}
          if (/^\d{4}-\d{2}-\d{2}$/.test(fields[i])){var p=fields[i].split('-');date=p[2]+'/'+p[1]+'/'+p[0];break;}
        }
        if (!date||date.startsWith('00')) return;
        var maxLen=0;
        for (var k=0;k<fields.length;k++){var f=fields[k].replace(/[R$\s.,0-9-]/g,'');if(f.length>maxLen){maxLen=f.length;desc=fields[k];}}
        for (var j=fields.length-1;j>=0;j--){var n=parseNum(fields[j].replace(/[R$\s]/g,''));if(n&&fields[j]!==date){val=n;break;}}
        if (!val) return;
        var tipo=val>0?'Entrada':'Saída', cat='Outros', dl=desc.toLowerCase();
        if (/cart[aã]o|compra/.test(dl)) cat='Cartão';
        else if (/pix/.test(dl)) cat='PIX';
        else if (/dep[^a]|dinheiro|atm/.test(dl)) cat='Depósito';
        else if (/juros/.test(dl)) cat='Juros';
        else if (/iof/.test(dl)) cat='IOF';
        else if (/estorno/.test(dl)) cat='Estorno';
        txs.push({date:date,lanc:desc,det:desc,val:Math.abs(val),tipo:tipo,cat:cat});
      });
      return txs;
    }

    function parsePDFText(text) {
      var txs=[], dateRE=/(\d{2}\/\d{2}\/\d{4})/, valREStr='[-]?\\d{1,3}(?:[.,]\\d{3})*[.,]\\d{2}';
      text.split(/\n/).forEach(function(line) {
        var dm=dateRE.exec(line); if (!dm) return;
        var date=dm[1]; if (date.startsWith('00')) return;
        var vals=[], m, vr=new RegExp(valREStr,'g');
        while ((m=vr.exec(line))!==null) vals.push(m[0]);
        if (!vals.length) return;
        var val=parseNum(vals[vals.length-1]); if (!val) return;
        var desc=line.replace(dateRE,'').replace(new RegExp(valREStr,'g'),'').replace(/\s+/g,' ').trim();
        var tipo=val>0?'Entrada':'Saída', cat='Outros', dl=desc.toLowerCase();
        if (/pix/.test(dl)) cat='PIX';
        else if (/cart[aã]o|compra/.test(dl)) cat='Cartão';
        else if (/dep[^a]|atm/.test(dl)) cat='Depósito';
        else if (/juros/.test(dl)) cat='Juros';
        txs.push({date:date,lanc:desc,det:desc,val:Math.abs(val),tipo:tipo,cat:cat});
      });
      return txs;
    }

    function postFilter(txs) {
      var discarded = [];
      // 1. Remove BB Rende Fácil (internal savings product)
      var rem = txs.filter(function(tx) {
        if (/rende\s*f[aá]cil/i.test(tx.lanc||'')||/rende\s*facil/i.test(tx.det||'')) {
          discarded.push(Object.assign({},tx,{motivo:'Investimento interno (BB Rende Fácil)'}));
          return false;
        }
        return true;
      });
      // 2. Cancel pairs: Estorno/devolução + original debit on same date & same value
      var toCancel = new Set();
      rem.forEach(function(tx, i) {
        if (!(/estorno|devolvido/i.test(tx.lanc||''))) return;
        if (tx.tipo !== 'Entrada') return;
        for (var j = 0; j < rem.length; j++) {
          if (j === i || toCancel.has(i) || toCancel.has(j)) continue;
          var other = rem[j];
          if (other.tipo === 'Saída' && other.date === tx.date && Math.abs(other.val - tx.val) < 0.01) {
            toCancel.add(i); toCancel.add(j); break;
          }
        }
      });
      rem.forEach(function(tx, i) {
        if (toCancel.has(i)) discarded.push(Object.assign({},tx,{motivo:'Par cancelado (estorno/devolução)'}));
      });
      rem = rem.filter(function(tx, i) { return !toCancel.has(i); });
      return { valid: rem, discarded: discarded };
    }

    function importFile(file, onDone) {
      var ext=(file.name.split('.').pop()||'').toLowerCase();
      var showLoading=function(msg){
        document.getElementById('finn-ab-content').innerHTML=
          '<div style="text-align:center;padding:40px;color:#94A3B8;font-size:13px;">'+
          '<div style="font-size:28px;margin-bottom:12px;">⏳</div>'+(msg||'Processando...')+'</div>';
      };
      if (ext==='csv') {
        var r=new FileReader();
        r.onload=function(ev){
          try{var txs=parseCSV(ev.target.result);if(!txs.length)txs=parseText(ev.target.result);
          if(!txs.length)throw new Error('Nenhuma transação encontrada.');onDone(null,txs);}catch(e){onDone(e);}};
        r.readAsText(file,'latin1');
      } else if (ext==='txt') {
        showLoading('Lendo arquivo TXT...');
        var r2=new FileReader();
        r2.onload=function(ev){
          try{var t=ev.target.result;var txs=parseText(t);if(!txs.length)txs=parseCSV(t);
          if(!txs.length)throw new Error('Nenhuma transação encontrada. Verifique o formato.');onDone(null,txs);}catch(e){onDone(e);}};
        r2.readAsText(file,'latin1');
      } else if (ext==='xlsx'||ext==='xls') {
        showLoading('Lendo planilha Excel...');
        var r3=new FileReader();
        r3.onload=function(ev){
          var buf=ev.target.result;
          function doXlsx(){try{var wb=XLSX.read(new Uint8Array(buf),{type:'array'});
            var ws=wb.Sheets[wb.SheetNames[0]];var csv=XLSX.utils.sheet_to_csv(ws);
            var txs=parseCSV(csv);if(!txs.length)txs=parseText(csv);
            if(!txs.length)throw new Error('Nenhuma transação encontrada na planilha.');onDone(null,txs);}catch(e){onDone(e);}}
          if (window.XLSX){doXlsx();}
          else loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',function(err){
            if(err){onDone(new Error('Falha ao carregar leitor XLSX. Verifique a conexão.'));return;}doXlsx();});
        };
        r3.readAsArrayBuffer(file);
      } else if (ext==='pdf') {
        showLoading('Extraindo texto do PDF...');
        function doPdf(){
          var fr=new FileReader();
          fr.onload=function(ev){
            var data=new Uint8Array(ev.target.result);
            pdfjsLib.getDocument({data:data}).promise.then(function(pdf){
              var pages=pdf.numPages,done=0,parts=[];
              function next(n){pdf.getPage(n).then(function(pg){
                pg.getTextContent().then(function(tc){
                  parts[n-1]=tc.items.map(function(it){return it.str;}).join(' ');
                  done++;
                  if(done<pages)next(n+1);
                  else{try{var txs=parsePDFText(parts.join('\n'));
                    if(!txs.length)throw new Error('Nenhuma transação encontrada. O PDF pode ser escaneado (imagem).');
                    onDone(null,txs);}catch(e){onDone(e);}}
                });}).catch(function(e){onDone(new Error('Erro página '+n+': '+e.message));});}
              next(1);
            }).catch(function(e){onDone(new Error('Erro ao abrir PDF: '+e.message));});
          };
          fr.readAsArrayBuffer(file);
        }
        if(window.pdfjsLib){doPdf();return;}
        loadScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js',function(err){
          if(err){onDone(new Error('Falha ao carregar leitor PDF. Verifique a conexão.'));return;}
          if(!pdfjsLib.GlobalWorkerOptions.workerSrc)
            pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
          doPdf();
        });
      } else {
        onDone(new Error('Formato .'+ext+' não suportado. Use: CSV, TXT, XLSX ou PDF.'));
      }
    }

    function analyze(txs) {
      var inc=txs.filter(function(t){return t.tipo==='Entrada';}),
          exp=txs.filter(function(t){return t.tipo==='Saída';});
      var tIn=inc.reduce(function(s,t){return s+t.val;},0),
          tOut=exp.reduce(function(s,t){return s+Math.abs(t.val);},0);
      var catOut={}, dayMap={};
      exp.forEach(function(t){catOut[t.cat]=(catOut[t.cat]||0)+Math.abs(t.val);});
      txs.forEach(function(t){dayMap[t.date]=(dayMap[t.date]||0)+t.val;});
      var outByCat=Object.keys(catOut).map(function(k){return{cat:k,val:catOut[k]};}).sort(function(a,b){return b.val-a.val;});
      var topExp=exp.slice().sort(function(a,b){return a.val-b.val;}).slice(0,5);
      var topInc=inc.slice().sort(function(a,b){return b.val-a.val;}).slice(0,5);
      var dates=Object.keys(dayMap).sort(), cum=0;
      var cumPts=dates.map(function(d){cum+=dayMap[d];return{v:cum,d:d};});
      return {txs:txs,inc:inc,exp:exp,tIn:tIn,tOut:tOut,net:tIn-tOut,outByCat:outByCat,topExp:topExp,topInc:topInc,dates:dates,cumPts:cumPts,catOut:catOut};
    }

    // ── ANALYSIS PANEL ──────────────────────────────────────────────────────

        e.classList.toggle('active', e.dataset.key === key);

    function normHex(v) {
      if (!v) return '';
      v = v.trim();
      if (v.charAt(0) !== '#') {
        var m = v.match(/\d+/g);
        if (!m || m.length < 3) return '';
        var h = m.slice(0,3).map(function(x){var n=parseInt(x).toString(16);return n.length<2?'0'+n:n;}).join('').toUpperCase();
        return '#' + h;
      }
      var h2 = v.slice(1).toUpperCase();
      if (h2.length === 3) h2 = h2[0]+h2[0]+h2[1]+h2[1]+h2[2]+h2[2];

    function patchEl(el, dark) {
      var s = el.style;
      if (!s) return;
      // background
      var rawBg = s.background || s.backgroundColor;
      if (rawBg) {
        var nb = normHex(rawBg);
        if (dark) {
          var db = BG[nb] || BG[rawBg.trim()];
          if (db) { el._ob=[s.background,s.backgroundColor]; if(s.background)s.background=db; else s.backgroundColor=db; }
        } else if (el._ob) { s.background=el._ob[0]; s.backgroundColor=el._ob[1]; delete el._ob; }
      } else if (dark && s.overflow === 'hidden' && s.borderRadius) {
        // Progress bar track: sem background mas com overflow:hidden + borderRadius → track visível
        el._progTrack = true;
        s.backgroundColor = 'rgba(255,255,255,.13)';
      } else if (!dark && el._progTrack) {
        s.backgroundColor = ''; delete el._progTrack;
      }
      // color
      var rawTx = s.color;
      if (rawTx) {
        var nt = normHex(rawTx);
        if (dark) {
          var dt = TX[nt] || TX[rawTx.trim()];
          if (dt) { el._ot=rawTx; s.color=dt; }
        } else if (el._ot !== undefined) { s.color=el._ot; delete el._ot; }
      }
      // border-color
      var rawBd = s.borderColor || s.borderBottomColor;
      if (rawBd) {
        var nbd = normHex(rawBd);
        if (dark) {
          var dbd = BD[nbd] || BD[rawBd.trim()];
          if (dbd) { el._obd=[s.borderColor,s.borderBottomColor]; if(s.borderColor)s.borderColor=dbd; else s.borderBottomColor=dbd; }
        } else if (el._obd) { s.borderColor=el._obd[0]; s.borderBottomColor=el._obd[1]; delete el._obd; }

      document.querySelectorAll('#root [style], body>[style], body>div>[style]').forEach(function(el){ patchEl(el, dark); });
      // deep pass em portals que ficam fora do root
      document.querySelectorAll('body>div').forEach(function(portal){
        portal.querySelectorAll('[style]').forEach(function(el){ patchEl(el, dark); });

      });

      obs.observe(document.body, {childList:true,subtree:true,attributes:true,attributeFilter:['style']});
    }

    function openPluggyWidget(connectToken) {

      setStatus('Sincronizando transações...', '#F97316');
      var now = new Date();
      var from = new Date(now); from.setMonth(from.getMonth() - 3);
      var fromStr = from.toISOString().slice(0, 10);
      fetch('/pluggy/transactions?itemId=' + encodeURIComponent(itemId) + '&from=' + fromStr)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) throw new Error(data.error);
          var txs = data.transactions || [];
          if (!txs.length) { setStatus('Nenhuma transacao nova encontrada.', '#64748B'); return; }

          var profiles;
          try { profiles = JSON.parse(localStorage.getItem('fiq_profiles') || '{}'); } catch(e) { profiles = {}; }
          var keys = Object.keys(profiles);
          if (!keys.length) { setStatus('Nenhum perfil Finn encontrado.', '#EF4444'); return; }
          var uid = keys[0];
          var prof = profiles[uid];
          if (!prof.transactions) prof.transactions = [];

          var existIds = {};
          prof.transactions.forEach(function(t) { existIds[String(t.id)] = 1; });
          var novos = txs.filter(function(t) { return !existIds[String(t.id)]; }).map(function(t) {
            return {
              id: t.id,
              date: t.date,
              descricao: t.description,
              value: t.amount,
              type: t.type,
              cat: t.category,
              banco: t.bank,
              source: 'pluggy'
            };
          });

          if (novos.length) {
            prof.transactions = prof.transactions.concat(novos);
            profiles[uid] = prof;
            try { localStorage.setItem('fiq_profiles', JSON.stringify(profiles)); } catch(e) {}
          }

          setStatus((novos.length ? novos.length + ' transacoes importadas!' : 'Ja sincronizado.'), '#22C55E');
          if (novos.length) setTimeout(function() { location.reload(); }, 1500);
        })
        .catch(function(e) { setStatus('Erro na sincronizacao: ' + e.message, '#EF4444'); });
    };

  function addSettingsPanel() {
    if (document.getElementById('finn-settings-panel')) return;

    var panel = document.createElement('div');

    var box = document.createElement('div');
