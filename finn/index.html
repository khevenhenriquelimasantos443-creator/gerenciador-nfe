    box.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">' +
        '<div style="color:#F8FAFC;font-weight:800;font-size:17px;">Configurações Finn</div>' +
        '<button id="finn-settings-close" style="background:#1E293B;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:#94A3B8;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;">&times;</button>' +
      '</div>' +
      '<div style="font-size:10px;font-weight:700;letter-spacing:.1em;color:#475569;text-transform:uppercase;margin-bottom:8px;">INTELIGÊNCIA ARTIFICIAL</div>' +
      '<div style="background:#1E293B;border-radius:12px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;">' +
        '<div style="width:36px;height:36px;background:rgba(249,115,22,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;">&#x1F916;</div>' +
        '<div><div style="color:#F8FAFC;font-size:13px;font-weight:700;margin-bottom:3px;">IA inclusa e pronta</div>' +
        '<div style="color:#64748B;font-size:11px;line-height:1.5;">Finn IA e análise de extratos já estão ativos para todos os usuários. Nenhuma configuração necessária.</div></div>' +
      '</div>' +
      '<div style="font-size:10px;font-weight:700;letter-spacing:.1em;color:#475569;text-transform:uppercase;margin-bottom:8px;">NOTIFICAÇÕES</div>' +
      '<div style="background:#1E293B;border-radius:12px;padding:14px;margin-bottom:16px;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">' +
          '<div>' +
            '<div style="color:#F8FAFC;font-size:13px;font-weight:700;margin-bottom:3px;">Alertas de limite</div>' +
            '<div style="color:#64748B;font-size:11px;line-height:1.5;">Avise quando um gasto ultrapassar o limite da categoria</div>' +
          '</div>' +
          '<label style="position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;">' +
            '<input type="checkbox" id="finn-notif-toggle" style="opacity:0;width:0;height:0;" />' +
            '<span id="finn-notif-slider" style="position:absolute;cursor:pointer;inset:0;background:#334155;border-radius:99px;transition:.3s;"></span>' +
          '</label>' +
        '</div>' +
        '<button id="finn-notif-test" style="margin-top:12px;background:#F9731622;border:1px solid #F9731644;border-radius:8px;padding:9px 14px;cursor:pointer;color:#FB923C;font-size:12px;font-weight:600;width:100%;text-align:center;">&#x1F514; Testar notificação</button>' +
        '<div id="finn-notif-status" style="margin-top:10px;font-size:11px;color:#64748B;display:none;"></div>' +
      '</div>' +
      '<div style="font-size:10px;font-weight:700;letter-spacing:.1em;color:#475569;text-transform:uppercase;margin-bottom:8px;">HISTÓRICO</div>' +
      '<div style="background:#1E293B;border-radius:12px;padding:14px;margin-bottom:16px;">' +
        '<button id="finn-cfg-view-analyses" style="background:#7C3AED22;border:1px solid #7C3AED44;border-radius:8px;padding:9px 14px;cursor:pointer;color:#A78BFA;font-size:12px;font-weight:600;width:100%;text-align:left;display:flex;align-items:center;gap:8px;">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>' +
          'Ver Histórico de Análises IA</button>' +
      '</div>';

    panel.appendChild(box);
    document.body.appendChild(panel);

    // ── Notification toggle styles (injected once) ──
    if (!document.getElementById('finn-notif-style')) {
      var ns = document.createElement('style');
      ns.id = 'finn-notif-style';
      ns.textContent = '#finn-notif-toggle:checked + #finn-notif-slider{background:#F97316}' +
        '#finn-notif-slider::before{content:"";position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}' +
        '#finn-notif-toggle:checked + #finn-notif-slider::before{transform:translateX(20px)}';
      document.head.appendChild(ns);
    }

    // ── Notification toggle logic ──
    var VAPID_PUBLIC_KEY = 'BMhwmg50YQu48xv8DnHXnbXKvKqL6dYPM_w6jx9-gHvZ-1RSOiDvtMEMxOGHagOjWgtawqcHA9kgVMx00639hcc';
    var notifToggle = document.getElementById('finn-notif-toggle');
    var notifStatus = document.getElementById('finn-notif-status');

    function updateNotifStatus(msg, color) {
      if (!notifStatus) return;
      notifStatus.textContent = msg;
      notifStatus.style.color = color || '#64748B';
      notifStatus.style.display = msg ? 'block' : 'none';
    }

    // Init toggle state
    var savedSub = localStorage.getItem('finn_push_sub');
    var notifPerm = ('Notification' in window) ? Notification.permission : 'unsupported';
    if (notifPerm === 'granted' && savedSub) {
      notifToggle.checked = true;
      document.getElementById('finn-notif-slider').style.background = '#F97316';
    }
    if (notifPerm === 'unsupported') {
      notifToggle.disabled = true;
      updateNotifStatus('Notificações não suportadas neste navegador', '#EF4444');
    } else if (notifPerm === 'denied') {
      notifToggle.disabled = true;
      updateNotifStatus('Notificações bloqueadas. Habilite nas configurações do navegador.', '#EF4444');
    }

    function urlB64ToUint8(b64) {
      var pad = '='.repeat((4 - b64.length % 4) % 4);
      var raw = atob(b64.replace(/-/g, '+').replace(/_/g, '/') + pad);
      return new Uint8Array(raw.split('').map(function(c){ return c.charCodeAt(0); }));
    }

    notifToggle.addEventListener('change', function() {
      if (!notifToggle.checked) {
        localStorage.removeItem('finn_push_sub');
        document.getElementById('finn-notif-slider').style.background = '#334155';
        updateNotifStatus('Notificações desativadas', '#64748B');
        return;
      }
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        updateNotifStatus('Push não suportado neste navegador', '#EF4444');
        notifToggle.checked = false;
        return;
      }
      updateNotifStatus('Solicitando permissão...', '#F97316');
      Notification.requestPermission().then(function(perm) {
        if (perm !== 'granted') {
          notifToggle.checked = false;
          document.getElementById('finn-notif-slider').style.background = '#334155';
          updateNotifStatus('Permissão negada', '#EF4444');
          return;
        }
        navigator.serviceWorker.ready.then(function(reg) {
          return reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlB64ToUint8(VAPID_PUBLIC_KEY)
          });
        }).then(function(sub) {
          var subJson = JSON.stringify(sub);
          localStorage.setItem('finn_push_sub', subJson);
          document.getElementById('finn-notif-slider').style.background = '#F97316';
          updateNotifStatus('✓ Notificações ativadas!', '#34D399');
          // Send subscription to server
          fetch('/push/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: subJson
          }).catch(function(){});
        }).catch(function(err) {
          notifToggle.checked = false;
          document.getElementById('finn-notif-slider').style.background = '#334155';
          updateNotifStatus('Erro: ' + err.message, '#EF4444');
        });
      });
    });

    var notifTestBtn = document.getElementById('finn-notif-test');
    if (notifTestBtn) {
      notifTestBtn.addEventListener('click', function() {
        if (!('Notification' in window) || Notification.permission !== 'granted') {
          updateNotifStatus('Ative as notificações primeiro.', '#EF4444');
          return;
        }
        navigator.serviceWorker.ready.then(function(reg) {
          reg.showNotification('🔔 Finn. — Teste', {
            body: 'Suas notificações estão funcionando! Você será avisado quando algum limite de categoria chegar a 90%.',
            icon: '/icon-192.svg',
            badge: '/icon-192.svg',
            tag: 'finn-test',
            data: { url: '/' }
          });
          updateNotifStatus('Notificação de teste enviada!', '#34D399');
        });
      });
    }

    function openSettings() {
      panel.style.display = 'flex';
      var fab = document.getElementById('finn-fab-stack');
      if (fab) fab.style.display = 'none';
      var pluggy = document.getElementById('finn-pluggy-btn');
      if (pluggy) pluggy.style.display = 'none';
    }
    function closeSettings() {
      panel.style.display = 'none';
      var fab = document.getElementById('finn-fab-stack');
      if (fab) fab.style.display = '';
      var pluggy = document.getElementById('finn-pluggy-btn');
      if (pluggy) pluggy.style.display = '';
    }

    document.getElementById('finn-settings-close').addEventListener('click', closeSettings);
    panel.addEventListener('click', function(e) { if (e.target === panel) closeSettings(); });

    document.getElementById('finn-cfg-view-analyses').addEventListener('click', function() {
      closeSettings();
      setTimeout(function() { window.finnOpenAnalysesHistory && window.finnOpenAnalysesHistory(); }, 100);
    });

    window.finnOpenSettings = openSettings;
  }

  // ── Budget limit push notification check ──
  function checkBudgetLimits() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    if (!localStorage.getItem('finn_push_sub')) return;
    try {
      var data = null;
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.startsWith('fiq_data_')) {
          try { var d = JSON.parse(localStorage.getItem(k)||'null'); if (d && d.txs) { data = d; break; } } catch(e2){}
        }
      }
      if (!data || !data.limits) return;
      var limits = data.limits;
      var txs = data.txs || [];
      var now = new Date(), yr = now.getFullYear(), mo = now.getMonth();
      var mTxs = txs.filter(function(t){ var d=new Date(t.date); return d.getFullYear()===yr&&d.getMonth()===mo; });
      var spent = {};
      mTxs.forEach(function(t) {
        var cat = t.cat || 'Outros';
        var val = (t.type==='receita'||t.type==='entrada') ? 0 : Math.abs(Number(t.value)||0);
        spent[cat] = (spent[cat]||0) + val;
      });
      var alerted = JSON.parse(localStorage.getItem('finn_limit_alerted')||'{}');
      var today = now.toISOString().slice(0,10);
      if (alerted._day !== today) alerted = { _day: today };
      Object.keys(limits).forEach(function(cat) {
        var lim = Number(limits[cat]||0);
        if (!lim) return;
        var s = spent[cat]||0;
        var pct = s/lim;
        if (pct >= 0.9 && !alerted[cat]) {
          alerted[cat] = true;
          navigator.serviceWorker.ready.then(function(reg) {
            reg.showNotification('🔔 Finn. — Limite de ' + cat, {
              body: 'Você gastou R$ ' + s.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}) + ' de R$ ' + lim.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}) + ' (' + Math.round(pct*100) + '%). Cuidado!',
              icon: '/icon-192.svg',
              tag: 'limit-' + cat,
              data: { url: '/' }
            });
          });
        }
      });
      localStorage.setItem('finn_limit_alerted', JSON.stringify(alerted));
    } catch(e) {}
  }

  window.addEventListener('focus', function() { setTimeout(checkBudgetLimits, 2000); });
  setTimeout(checkBudgetLimits, 5000);
