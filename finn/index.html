// Simula o pagamento das dívidas mês a mês: aplica juros, paga a parcela
// mínima de cada uma, e joga toda sobra (extra + parcelas já quitadas) na
// dívida prioritária da estratégia. Isso é o método real de "bola de neve"/
// "avalanche" — o orçamento mensal total fica fixo, só a ordem de ataque muda.
function simulateDebtPayoff(debtsInput, extraMonthly, strategy){
  var debts = debtsInput.map(function(d){
    return { name: d.name, remaining: Number(d.remaining_value), rate: Number(d.interest_rate)/100, minPayment: Number(d.monthly_payment) };
  }).filter(function(d){ return d.remaining > 0; });
  if(!debts.length) return { months: 0, totalInterest: 0, order: [], maxedOut: false };

  var totalBudget = debts.reduce(function(s,d){ return s + d.minPayment; }, 0) + Number(extraMonthly || 0);
  var order = debts.slice().sort(function(a,b){
    return strategy === "avalanche" ? (b.rate - a.rate) : (a.remaining - b.remaining);
  });

  var totalInterest = 0, months = 0, payoffOrder = [];
  var maxMonths = 600;

  while(order.some(function(d){ return d.remaining > 0.01; }) && months < maxMonths){
    months++;
    order.forEach(function(d){
      if(d.remaining > 0){
        var interest = d.remaining * d.rate;
        totalInterest += interest;
        d.remaining += interest;
      }
    });
    var budgetLeft = totalBudget;
    order.forEach(function(d){
      if(d.remaining > 0){
        var pay = Math.min(d.minPayment, d.remaining, budgetLeft);
        d.remaining -= pay;
        budgetLeft -= pay;
      }
    });
    for(var i=0;i<order.length && budgetLeft>0.01;i++){
      var d = order[i];
      if(d.remaining > 0){
        var pay = Math.min(d.remaining, budgetLeft);
        d.remaining -= pay;
        budgetLeft -= pay;
      }
    }
    // Passo separado, fora do for acima: uma dívida pode ter zerado só com o
    // pagamento mínimo (antes do extra) e o for de orçamento extra pode nem
    // chegar a visitá-la (se acabar o budget antes ou se extraMonthly for 0) —
    // sem isso, ela quitava mas nunca entrava no payoffOrder.
    order.forEach(function(d){
      if(d.remaining <= 0.01 && payoffOrder.indexOf(d.name) === -1) payoffOrder.push(d.name);
    });
  }
  return { months: months, totalInterest: totalInterest, order: payoffOrder, maxedOut: months>=maxMonths };
}

function runDebtSimulation(){
  var extra = parseFloat(state.debtExtraPayment) || 0;
  var activeDebts = state.debts.filter(function(d){ return Number(d.remaining_value) > 0; });
  var avalanche = simulateDebtPayoff(activeDebts, extra, "avalanche");
  var snowball = simulateDebtPayoff(activeDebts, extra, "snowball");
  var best = avalanche.maxedOut && snowball.maxedOut ? null :
    (avalanche.maxedOut ? "snowball" : snowball.maxedOut ? "avalanche" : (avalanche.totalInterest <= snowball.totalInterest ? "avalanche" : "snowball"));
  state.debtSim = { avalanche: avalanche, snowball: snowball, best: best };
  render();
}

function splitEqually(){
  var total = parseFloat(splitForm.total) || 0;
  var n = splitForm.participants.length;
  if(!total || !n) return;
  var base = Math.floor(total / n * 100) / 100;
  var sum = 0;
  splitForm.participants.forEach(function(p, i){
    if(i === n - 1){
      p.value = (total - sum).toFixed(2);
    } else {
      p.value = base.toFixed(2);
      sum += base;
    }
  });
}

  };
  state.splitError = null;
  db("splits", "POST", payload).then(function(rows){
    var split = rows && rows[0];
    if(!split) return Promise.reject(new Error("Falha ao criar a racha"));
    var participantsPayload = valid.map(function(p){
      return { user_id: uid(), split_id: split.id, name: p.name, value: parseFloat(p.value) };
    });
    return db("split_participants", "POST", participantsPayload).then(function(prows){
      state.splits.unshift(split);
      state.splitParticipants = state.splitParticipants.concat(prows || []);
      resetSplitForm();
      render();
    }).catch(function(err){
      // A racha foi criada mas os participantes falharam — desfaz pra não
      // sobrar uma racha órfã sem ninguém, e pra permitir tentar de novo
      // sem risco de duplicar a racha em si.
      return db("splits", "DELETE", null, { id: "eq." + split.id, user_id: "eq." + uid() }).catch(function(){}).then(function(){
        throw err;
      });
    });
  }).catch(function(err){
    state.splitError = (err && err.message) || "Erro desconhecido";
    render();
  });
}

function toggleParticipantPaid(id){
  var p = state.splitParticipants.filter(function(x){ return x.id === id; })[0];
  if(!p) return;
  var prevPaid = p.paid;
  p.paid = !p.paid;
  render();
  db("split_participants", "PATCH", { paid: p.paid }, { id: "eq." + id, user_id: "eq." + uid() }).catch(function(err){
    p.paid = prevPaid;
    state.splitError = "Não consegui atualizar (" + ((err && err.message) || "erro") + "). Tenta de novo.";
    render();
  });
}

function deleteSplit(id){
  var existing = state.splits.filter(function(s){ return s.id === id; })[0];
  if(!existing) return;
  var existingParticipants = state.splitParticipants.filter(function(p){ return p.split_id === id; });
  state.splits = state.splits.filter(function(s){ return s.id !== id; });
  state.splitParticipants = state.splitParticipants.filter(function(p){ return p.split_id !== id; });
  render();
  db("splits", "DELETE", null, { id: "eq." + id, user_id: "eq." + uid() }).catch(function(err){
    state.splits.push(existing);
    state.splitParticipants = state.splitParticipants.concat(existingParticipants);
    state.splitError = "Não consegui apagar a racha (" + ((err && err.message) || "erro") + "). Tenta de novo.";
    render();
  });
}

function inlineMd(s){
  return s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
}

function renderMarkdownLite(text){
  var lines = escapeHtml(text || "").split("\n");
  var html = "";
  var listType = null;
  function closeList(){ if(listType){ html += "</" + listType + ">"; listType = null; } }
  lines.forEach(function(line){
    var trimmed = line.trim();
    if(trimmed === ""){ closeList(); return; }
    if(/^-{3,}$/.test(trimmed)){ closeList(); html += "<hr>"; return; }
    var h = trimmed.match(/^(#{1,6})\s+(.*)/);
    if(h){
      closeList();
      var level = Math.min(h[1].length + 2, 6);
      html += "<h" + level + ">" + inlineMd(h[2]) + "</h" + level + ">";
      return;
    }
    var ol = trimmed.match(/^\d+\.\s+(.*)/);
    var ul = trimmed.match(/^[-*]\s+(.*)/);
    if(ol){
      if(listType !== "ol"){ closeList(); html += "<ol>"; listType = "ol"; }
      html += "<li>" + inlineMd(ol[1]) + "</li>";
      return;
    }
    if(ul){
      if(listType !== "ul"){ closeList(); html += "<ul>"; listType = "ul"; }
      html += "<li>" + inlineMd(ul[1]) + "</li>";
      return;
    }
    closeList();
    html += "<p>" + inlineMd(trimmed) + "</p>";
  });
  closeList();
  return html;
}

function buildFinanceSummary(){
  var ym = thisMonth();
  var txs = txsOfMonth(ym);
  var receita = txs.filter(function(t){return t.type==="receita" && isFlowTx(t);}).reduce(function(s,t){return s+Number(t.value);},0);
  var despesa = txs.filter(function(t){return t.type==="despesa" && isFlowTx(t);}).reduce(function(s,t){return s+Number(t.value);},0);
  var byCat = {};
  txs.filter(function(t){return t.type==="despesa" && isFlowTx(t);}).forEach(function(t){ byCat[t.category] = (byCat[t.category]||0) + Number(t.value); });
  var catLines = Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];})
    .map(function(c){ return "- " + c + ": R$ " + byCat[c].toFixed(2); }).join("\n") || "- (sem despesas)";
  var limLines = state.limits.map(function(l){
    return "- " + l.category + ": gastou R$ " + monthSpentByCat(l.category).toFixed(2) + " de R$ " + Number(l.monthly_limit).toFixed(2);
  }).join("\n") || "- (nenhum limite definido)";
  var goalLines = state.goals.map(function(g){
    return "- " + g.name + ": R$ " + Number(g.saved).toFixed(2) + " de R$ " + Number(g.target).toFixed(2);
  }).join("\n") || "- (nenhuma meta)";
  return "Mês: " + ym + "\nReceita total: R$ " + receita.toFixed(2) + "\nDespesa total: R$ " + despesa.toFixed(2) +
    "\nSaldo: R$ " + (receita-despesa).toFixed(2) + "\n\nDespesas por categoria:\n" + catLines +
    "\n\nLimites:\n" + limLines + "\n\nMetas:\n" + goalLines;
}

  db("categories", "DELETE", null, { id: "eq." + id, user_id: "eq." + uid() }).catch(function(){});

function deleteAllTransactions(){
  if(!window.confirm("Isso vai apagar TODOS os seus lançamentos (receitas e despesas). Limites, metas, contas fixas e categorias não são afetados. Essa ação não pode ser desfeita. Continuar?")) return;
  if(!window.confirm("Tem certeza mesmo? Não tem como recuperar depois.")) return;
  var receiptPaths = state.txs.map(function(t){ return t.receipt_path; }).filter(Boolean);
  db("transactions", "DELETE", null, { user_id: "eq." + uid() }).then(function(){
    state.txs = [];
    state.configMsg = "Todos os lançamentos foram excluídos.";
    render();
    receiptPaths.forEach(deleteReceiptObject);
  }).catch(function(err){
    state.configMsg = "Não consegui apagar os lançamentos (" + (err && err.message ? err.message : "erro") + "). Tenta de novo.";
    render();
  });
}

function deleteAllData(){
  if(!window.confirm("Isso vai apagar TODOS os seus lançamentos, limites, metas, contas fixas, cartões, dívidas, rachas e categorias. Essa ação não pode ser desfeita. Continuar?")) return;
  if(!window.confirm("Tem certeza mesmo? Não tem como recuperar depois.")) return;
  var receiptPaths = state.txs.map(function(t){ return t.receipt_path; }).filter(Boolean);
  var tables = ["transactions", "spending_limits", "goals", "fixed_accounts", "splits", "categories", "debts"];
  Promise.all(tables.map(function(t){
    return db(t, "DELETE", null, { user_id: "eq." + uid() });
  })).then(function(){
    receiptPaths.forEach(deleteReceiptObject);
    return db("credit_cards", "DELETE", null, { user_id: "eq." + uid() }).catch(function(){});
  }).then(function(){
    return Auth.logout(currentSession.access_token);
  }).then(function(){
    currentSession = null;
    showLogin();
  }).catch(function(err){
    state.configMsg = "Não consegui apagar tudo (" + (err && err.message ? err.message : "erro") + "). Tenta de novo.";
    render();
  });
}

/* ── render dispatch ── */
function render(){
  document.querySelectorAll(".tab-btn").forEach(function(btn){
    btn.classList.toggle("active", btn.dataset.tab === state.tab);
  });
  var content = document.getElementById("content");
  if(state.loading){
    content.innerHTML = '<div class="empty-state">Carregando…</div>';
    return;
  }
  if(state.loadError){
    content.innerHTML = '<div class="card"><div class="ai-error">Não consegui carregar seus dados (' + escapeHtml(state.loadError) + ').</div>' +
      '<button type="button" class="btn-submit" id="btnRetryLoad" style="margin-top:10px">Tentar de novo</button></div>';
    var retry = document.getElementById("btnRetryLoad");
    if(retry) retry.addEventListener("click", function(){ loadData(); });
    return;
  }
  if(state.tab === "dashboard") content.innerHTML = renderDashboard();
  else if(state.tab === "adicionar") content.innerHTML = renderAdicionar();
  else if(state.tab === "analises") content.innerHTML = renderAnalises();
  else if(state.tab === "lancamentos") content.innerHTML = renderLancamentos();
  else if(state.tab === "limites") content.innerHTML = renderLimites();
  else if(state.tab === "metas") content.innerHTML = renderMetas();
  else if(state.tab === "fixas") content.innerHTML = renderFixas();
  else if(state.tab === "cartoes") content.innerHTML = renderCartoes();
  else if(state.tab === "dividas") content.innerHTML = renderDividas();
  else if(state.tab === "racha") content.innerHTML = renderRacha();
  else if(state.tab === "ia") content.innerHTML = renderIA();
  else content.innerHTML = renderConfig();
  bindContentEvents();
}

/* ── transaction CRUD ── */
function saveTransaction(){
  var value = parseFloat(formState.value);
  // Chama render() mesmo saindo cedo — sem isso, o botão desabilitado no
  // clique (pra evitar duplo-envio) ficava travado pra sempre num valor
  // inválido, já que nenhum outro render() aconteceria depois.
  if(!value || value <= 0){ render(); return; }
  var fields = {
    type: formState.type,
    category: formState.category,
    description: formState.description || formState.category,
    value: value,
    date: formState.date
  };
  if(state.cards.length) fields.card_id = formState.type === "despesa" ? (formState.cardId || null) : null;
  state.txSaveError = null;
  if(formState.editingId){
    var id = formState.editingId;
    var original = state.txs.filter(function(t){ return t.id === id; })[0];
    var categoryChanged = original && original.category !== fields.category;
    db("transactions", "PATCH", fields, { id: "eq." + id, user_id: "eq." + uid() }).then(function(rows){
      var updated = (rows && rows[0]) ? rows[0] : null;
      state.txs = state.txs.map(function(t){
        return t.id === id ? (updated || Object.assign({}, t, fields)) : t;
      });
      sortTxs(); resetForm(); state.tab = "lancamentos";
      if(categoryChanged){
        var siblings = state.txs.filter(function(t){
          return t.id !== id && t.type === fields.type && normDesc(t.description) === normDesc(fields.description) && t.category !== fields.category;
        });
        if(siblings.length){
          state.bulkCatPrompt = { ids: siblings.map(function(t){ return t.id; }), description: fields.description, category: fields.category };
        }
      }
      checkPriceAnomaly(fields.type, fields.description, fields.value, id);
      render();
    }).catch(function(err){
      state.txSaveError = (err && err.message) || "Erro desconhecido";
      render();
    });
  } else {
    var payload = Object.assign({ user_id: uid() }, fields);
    db("transactions", "POST", payload).then(function(rows){
      if(rows && rows[0]) state.txs.unshift(rows[0]);
      sortTxs();
      formState.value = ""; formState.description = "";
      checkPriceAnomaly(fields.type, fields.description, fields.value, rows && rows[0] && rows[0].id);
      render();
    }).catch(function(err){
      state.txSaveError = (err && err.message) || "Erro desconhecido";
      render();
    });
  }
}

function fixInvestmentCategories(){
  var ids = [];
  state.txs.forEach(function(t){
    if(t.category === "Investimento") return;
    var guessed = guessCategory(t.description || "");
    if(guessed === "Investimento") ids.push(t.id);
  });
  if(!ids.length){
    state.configMsg = "Nenhum lançamento precisava de correção. Já está tudo certo.";
    render();
    return;
  }
  state.txs = state.txs.map(function(t){
    return ids.indexOf(t.id) !== -1 ? Object.assign({}, t, { category: "Investimento" }) : t;
  });
  state.configMsg = "Corrigindo " + ids.length + " lançamento(s)...";
  render();
  db("transactions", "PATCH", { category: "Investimento" }, { id: "in.(" + ids.join(",") + ")", user_id: "eq." + uid() }).then(function(){
    state.configMsg = ids.length + " lançamento(s) reclassificado(s) como Investimento.";
    render();
  }).catch(function(err){
    state.configMsg = "Reclassifiquei localmente, mas não consegui salvar tudo no banco (" + (err && err.message ? err.message : "erro") + "). Tenta de novo.";
    render();
  });
}

function applyBulkCategory(){
  var prompt = state.bulkCatPrompt;
  if(!prompt) return;
  var ids = prompt.ids;
  state.txs = state.txs.map(function(t){
    return ids.indexOf(t.id) !== -1 ? Object.assign({}, t, { category: prompt.category }) : t;
  });
  state.bulkCatPrompt = null;
  render();
  db("transactions", "PATCH", { category: prompt.category }, { id: "in.(" + ids.join(",") + ")", user_id: "eq." + uid() });
}

function dismissBulkCatPrompt(){
  state.bulkCatPrompt = null;
  render();
}

function dismissPriceAlert(){
  state.priceAlert = null;
  render();
}

function dismissReceiptMsg(){
  state.receiptMsg = null;

}

function startEdit(id){
  var t = state.txs.filter(function(x){ return x.id === id; })[0];
  if(!t) return;
  formState = {
    editingId: id, type: t.type, category: t.category,
    description: t.description || "", value: String(t.value), date: t.date, cardId: t.card_id || ""
  };
  state.tab = "adicionar";
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function deleteTransaction(id){
  var existing = state.txs.filter(function(t){ return t.id === id; })[0];
  if(!existing) return;
  var receiptPath = existing.receipt_path;
  state.txs = state.txs.filter(function(t){ return t.id !== id; });
  if(formState.editingId === id) resetForm();
  render();
  db("transactions", "DELETE", null, { id: "eq." + id, user_id: "eq." + uid() }).then(function(){
    if(receiptPath) deleteReceiptObject(receiptPath);
  }).catch(function(err){
    state.txs.push(existing);
    sortTxs();
    state.txSaveError = "Não consegui apagar (" + ((err && err.message) || "erro") + "). Tenta de novo.";
    render();
  });
}

/* ── comprovante (foto/recibo) ── */
function deleteReceiptObject(path){
  var token = (currentSession && currentSession.access_token) || SUPA_KEY;
  fetch(SUPA_URL + "/storage/v1/object/receipts/" + path, {
    method: "DELETE",
    headers: { apikey: SUPA_KEY, Authorization: "Bearer " + token }
  }).catch(function(){});
}

function uploadReceipt(file, txId){
  state.receiptUploadingId = txId;
  state.receiptMsg = null;
  render();
  var path = uid() + "/" + txId + "-" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9.\-_]/g, "_");
  var token = (currentSession && currentSession.access_token) || SUPA_KEY;
  fetch(SUPA_URL + "/storage/v1/object/receipts/" + path, {
    method: "POST",
    headers: { apikey: SUPA_KEY, Authorization: "Bearer " + token, "Content-Type": file.type || "application/octet-stream" },
    body: file
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){ throw new Error(t || ("Erro " + r.status)); });
    return db("transactions", "PATCH", { receipt_path: path }, { id: "eq." + txId, user_id: "eq." + uid() });
  }).then(function(rows){
    var updated = rows && rows[0];
    state.txs = state.txs.map(function(t){ return t.id === txId ? (updated || Object.assign({}, t, { receipt_path: path })) : t; });
    state.receiptUploadingId = null;
    render();
  }).catch(function(err){
    state.receiptUploadingId = null;
    state.receiptMsg = "Não consegui anexar o comprovante (" + (err && err.message ? err.message : "erro") + "). Tenta de novo.";
    render();
  });
}

function viewReceipt(path){
  var token = (currentSession && currentSession.access_token) || SUPA_KEY;
  fetch(SUPA_URL + "/storage/v1/object/sign/receipts/" + path, {
    method: "POST",
    headers: { apikey: SUPA_KEY, Authorization: "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify({ expiresIn: 60 })
  }).then(function(r){ return r.json(); }).then(function(data){
    if(data && data.signedURL) window.open(SUPA_URL + "/storage/v1" + data.signedURL, "_blank");
    else { state.receiptMsg = "Não consegui abrir o comprovante."; render(); }
  }).catch(function(){
    state.receiptMsg = "Não consegui abrir o comprovante.";
    render();
  });
}

  };
  state.goalSaveError = null;
  db("goals", "POST", payload).then(function(rows){

    goalForm = { name: "", target: "", deadline: "" };

function addToGoal(id, amountStr, direction){
  var amount = parseFloat(amountStr);
  if(!amount || amount <= 0) return;
  var goal = state.goals.filter(function(g){ return g.id === id; })[0];
  if(!goal) return;
  var sub = direction === "sub";
  var delta = sub ? -amount : amount;
  var newSaved = Math.max(0, Number(goal.saved) + delta);
  var movedAmount = Math.abs(newSaved - Number(goal.saved));
  goal.saved = newSaved;
  render();
  db("goals", "PATCH", { saved: newSaved }, { id: "eq." + id, user_id: "eq." + uid() });
  if(movedAmount > 0){
    var mov = { user_id: uid(), goal_id: id, amount: movedAmount, type: sub ? "retirada" : "deposito", date: todayStr() };
    db("goal_movements", "POST", mov).then(function(rows){
      if(rows && rows[0]) state.goalMovements.unshift(rows[0]);
      render();
    });
  }
}

function deleteGoal(id){
  var existing = state.goals.filter(function(g){ return g.id === id; })[0];
  if(!existing) return;
  state.goals = state.goals.filter(function(g){ return g.id !== id; });
  render();
  db("goals", "DELETE", null, { id: "eq." + id, user_id: "eq." + uid() }).catch(function(err){
    state.goals.push(existing);
    state.goalSaveError = "Não consegui apagar (" + ((err && err.message) || "erro") + "). Tenta de novo.";
    render();
  });
}

// loadCards/loadDebts rodam em paralelo com loadData no login e podem
// terminar bem depois dela — se o usuário já começou a digitar em algum
// formulário quando a resposta chega, um render() aqui recriava o DOM
// inteiro da aba atual e derrubava o que a pessoa tinha acabado de digitar.
// Se o foco estiver num campo de formulário, adia o render: o estado já foi
// atualizado e aparece na próxima renderização natural (submit, troca de aba etc).
function isTypingInForm(){
  var el = document.activeElement;
  var content = document.getElementById("content");
  return !!el && !!content && content.contains(el) &&
    (el.tagName === "INPUT" || el.tagName === "SELECT" || el.tagName === "TEXTAREA");
}

function loadCards(){

  }).catch(function(err){

    state.cardsError = (err && err.message) || "Erro desconhecido";
    if(!isTypingInForm()) render();

// Busca todas as páginas: o limite de 1000 por requisição (padrão do
// PostgREST) cortava lançamentos antigos quando a conta passava de
// 1000 transações, sumindo com meses inteiros sem aviso nenhum.
function dbAll(table, query){
  var pageSize = 1000;
  var all = [];
  function fetchPage(offset){
    var q = Object.assign({}, query, { limit: String(pageSize), offset: String(offset) });
    return db(table, "GET", null, q).then(function(rows){
      rows = rows || [];
      all = all.concat(rows);
      if(rows.length === pageSize) return fetchPage(offset + pageSize);
      return all;
    });
  }
  return fetchPage(0);
}

/* ── one-time purge of leftover service workers from old deploys ──
   A stale SW from a previous version could keep intercepting fetches
   (incl. the update-check below) forever. This now runs only once per
   browser (gated by localStorage) so a SW registered afterwards for
   push notifications isn't immediately killed on the next page load. */
if ("serviceWorker" in navigator && !localStorage.getItem("finn_sw_purge_v1")) {
  var wasSwControlled = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(reg){ reg.unregister(); });
    localStorage.setItem("finn_sw_purge_v1", "1");
    if (wasSwControlled && !sessionStorage.getItem("finn_sw_cleanup_done")) {
      sessionStorage.setItem("finn_sw_cleanup_done", "1");
      window.location.reload();
    }
  });
}
if (window.caches) {
  caches.keys().then(function(keys){
    keys.forEach(function(k){ caches.delete(k); });
  });
}

// Registro do service worker era feito só dentro do fluxo de ativar push —
// então quem nunca clicou em "Ativar notificações" nunca tinha um SW
// instalado, e o "Nova versão disponível" (avisado via postMessage do SW
// quando uma nova versão assume) nunca tinha chance de disparar. Registra
// incondicionalmente, além de deixar o app instalável/offline de verdade.
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(function(){});
  navigator.serviceWorker.addEventListener("message", function(e){
    if (e.data && e.data.type === "SW_UPDATED") {
      document.getElementById("updateBanner").classList.add("show");
    }
  });
}

/* ── push notifications ── */
function urlBase64ToUint8Array(base64String){
  var padding = "=".repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  var rawData = atob(base64);
  var out = new Uint8Array(rawData.length);
  for(var i = 0; i < rawData.length; i++) out[i] = rawData.charCodeAt(i);
  return out;
}

function arrayBufferToBase64Url(buffer){
  var bytes = new Uint8Array(buffer);
  var bin = "";
  for(var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function enablePushNotifications(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window)){
    state.pushStatus = "Seu navegador não suporta notificações push.";
    render();
    return;
  }
  state.pushStatus = "Ativando…";
  render();
  navigator.serviceWorker.register("/sw.js").then(function(reg){
    return Notification.requestPermission().then(function(perm){
      if(perm !== "granted") throw new Error("Permissão de notificações negada.");
      return reg.pushManager.getSubscription().then(function(existing){
        return existing || reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      });
    });
  }).then(function(sub){
    return fetch("/push/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        endpoint: sub.endpoint,
        keys: {
          p256dh: arrayBufferToBase64Url(sub.getKey("p256dh")),
          auth: arrayBufferToBase64Url(sub.getKey("auth"))
        },
        access_token: currentSession && currentSession.access_token
      })
    });
  }).then(function(r){ return r.json(); }).then(function(j){
    state.pushStatus = (j && j.ok) ? "Notificações ativadas! Você vai receber avisos de contas fixas vencendo." : "Não foi possível ativar agora. Tente de novo.";
    render();
  }).catch(function(err){
    state.pushStatus = "Erro: " + err.message;
    render();
  });
}

/* ── update banner ── */
var knownETag = null;
function checkForUpdate(){
  // cache:"no-store" só controla o cache HTTP do próprio navegador — um CDN/
  // proxy no meio do caminho (ex: domínio próprio atrás do Cloudflare) podia
  // servir uma resposta antiga e o ETag nunca parecia mudar. O parâmetro
  // aleatório força cada checagem a ser uma URL nova, sem chance de cache.
  var bustedUrl = window.location.pathname + "?_swcheck=" + Date.now();
  fetch(bustedUrl, { method: "HEAD", cache: "no-store" }).then(function(r){
    var et = r.headers.get("ETag");
    if(!et) return;
    if(knownETag === null){ knownETag = et; return; }
    if(et !== knownETag){
      document.getElementById("updateBanner").classList.add("show");
    }
  }).catch(function(){});
}
checkForUpdate();
setInterval(checkForUpdate, 5 * 60 * 1000);
document.addEventListener("visibilitychange", function(){
  if(!document.hidden) checkForUpdate();
});

document.querySelectorAll(".tab-btn").forEach(function(btn){
  btn.addEventListener("click", function(){
    // Sair de Lançamentos com uma edição em andamento (sem salvar/cancelar)
    // cancela a edição — senão o formState.editingId ficava "vazando" pra
    // outras abas e um lançamento rápido em outro lugar acabava dando PATCH
    // na transação antiga em vez de criar uma nova.
    if(formState.editingId && btn.dataset.tab !== "adicionar") resetForm();
    state.tab = btn.dataset.tab;

document.getElementById("btnMenu").addEventListener("click", function(e){

  document.getElementById("navMenu").classList.toggle("open");
});
document.addEventListener("click", function(e){
  var navMenu = document.getElementById("navMenu");
  if(!navMenu.classList.contains("open")) return;
  if(navMenu.contains(e.target) || e.target === document.getElementById("btnMenu")) return;
  navMenu.classList.remove("open");
});

Auth.initSession().then(function(session){
  if(session){
    currentSession = session;
    showApp();
  } else {
    showLogin();
  }
});

})();
