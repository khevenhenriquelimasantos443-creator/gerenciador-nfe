name = "wild-sun-742ffinn-whatsapp-worker"
main = "index.js"
compatibility_date = "2024-01-01"

# ─────────────────────────────────────────────
#  Worker de IA (áudio/foto) — já habilitado na conta
# ─────────────────────────────────────────────
[ai]
binding = "AI"

# ─────────────────────────────────────────────
#  CRON: envia resumo diário às 22h (horário BRT)
# ─────────────────────────────────────────────
[triggers]
crons = ["0 1 * * *"]

# ─────────────────────────────────────────────
#  PASSO 2 — KV Namespace (banco de dados do bot)
#  Como criar:
#    1. Acesse dash.cloudflare.com → Workers & Pages → KV
#    2. Clique em "Create namespace", nome: finn-kv
#    3. Copie o "Namespace ID" e cole abaixo
# ─────────────────────────────────────────────
[[kv_namespaces]]
binding = "FINN_KV"
id = "47c375c30cb94e7686218d7bdd3e3e1a"

# ─────────────────────────────────────────────
#  VARIÁVEIS DE AMBIENTE (não-secretas)
#  Troque pelo URL real do seu app Finn
# ─────────────────────────────────────────────
[vars]
FINN_URL = "https://finn.dev.br"
# WhatsApp Business Account ID (Finn.Finnance) — usado por GET /subscribe
# pra inscrever o app nos eventos dessa conta. Não é um segredo (é só um
# identificador), por isso fica junto das outras vars não-secretas.
WHATSAPP_WABA_ID = "1012331314486966"
# URL pública deste worker — usado por GET /telegram/set-webhook pra montar
# o endereço do webhook (<FINN_WORKER_URL>/telegram/webhook) que é registrado
# na Telegram. Precisa bater com o "name" acima (ver Cloudflare dashboard).
FINN_WORKER_URL = "https://wild-sun-742ffinn-whatsapp-worker.khevenhenriquelimasantos443.workers.dev"

# ─────────────────────────────────────────────
#  SEGREDOS — adicione via terminal após deploy:
#
#  wrangler secret put WHATSAPP_PHONE_NUMBER_ID
#    → Cole o "Phone Number ID" do Meta Developer
#
#  wrangler secret put WHATSAPP_ACCESS_TOKEN
#    → Cole o token de acesso do Meta Developer
#
#  wrangler secret put WHATSAPP_VERIFY_TOKEN
#    → Crie uma senha qualquer, ex: finn_bot_2024
#      (você vai precisar dela na hora de configurar o webhook)
#
#  wrangler secret put TELEGRAM_BOT_TOKEN
#    → Token do bot, dado pelo @BotFather no Telegram
#
#  wrangler secret put TELEGRAM_WEBHOOK_SECRET
#    → Crie uma senha qualquer (protege o endpoint /telegram/webhook)
#
#  wrangler secret put TELEGRAM_BOT_USERNAME
#    → O @username do bot escolhido no BotFather, sem o @
#
#  Depois de configurar os 3 acima, registre o webhook uma vez:
#    GET https://<seu-worker>.workers.dev/telegram/set-webhook?token=<ADMIN_TOKEN>
# ─────────────────────────────────────────────
