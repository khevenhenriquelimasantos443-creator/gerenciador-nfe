name: Deploy Finn → Cloudflare Workers

on:
  push:
    branches:
      - main
      - claude/finn-whatsapp-integration-sz61nv

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy (app)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Worker (embed HTML)
        run: node finn-serve/build.js

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: finn-serve

  deploy-whatsapp-bot:
    runs-on: ubuntu-latest
    name: Deploy WhatsApp Bot
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: finn-worker
