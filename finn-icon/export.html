<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finn Icon Export</title>
<style>
  body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; font-family: sans-serif; }
  canvas { border-radius: 20px; box-shadow: 0 0 60px rgba(249,115,22,0.3); }
  button { padding: 12px 32px; background: #F97316; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
  button:hover { background: #FB923C; }
  p { color: #94A3B8; font-size: 14px; margin: 0; }
</style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<button onclick="dl()">⬇ Baixar PNG 1024×1024</button>
<p>Clique no botão para salvar o ícone como finn-icon-1024.png</p>
<script>
var img = new Image();
img.onload = function() {
  var c = document.getElementById('c');
  c.getContext('2d').drawImage(img, 0, 0);
};
img.src = 'icon.svg';

function dl() {
  var c = document.getElementById('c');
  var a = document.createElement('a');
  a.download = 'finn-icon-1024.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
