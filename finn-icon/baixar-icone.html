<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Baixar Ícone Finn</title>
<style>
  body { margin: 0; background: #0F172A; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; font-family: sans-serif; }
  canvas { border-radius: 20%; box-shadow: 0 0 80px rgba(249,115,22,0.4); width: 256px; height: 256px; }
  button { padding: 14px 40px; background: #F97316; color: #fff; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: 700; letter-spacing: 0.5px; }
  button:hover { background: #FB923C; }
  p { color: #64748B; font-size: 13px; margin: 0; }
</style>
</head>
<body>
<canvas id="c" width="1024" height="1024"></canvas>
<button onclick="dl()">⬇ Baixar PNG 1024×1024</button>
<p>finn-icon-1024.png — pronto para o Meta</p>
<script>
var svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:0.3"/>
      <stop offset="60%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#FB923C"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <g opacity="0.15">
    <rect x="148" y="620" width="72" height="140" rx="8" fill="#F97316"/>
    <rect x="248" y="560" width="72" height="200" rx="8" fill="#F97316"/>
    <rect x="348" y="490" width="72" height="270" rx="8" fill="#F97316"/>
    <rect x="448" y="540" width="72" height="220" rx="8" fill="#F97316"/>
    <rect x="548" y="460" width="72" height="300" rx="8" fill="#F97316"/>
    <rect x="648" y="390" width="72" height="370" rx="8" fill="#F97316"/>
    <rect x="748" y="330" width="72" height="430" rx="8" fill="#F97316"/>
    <rect x="848" y="280" width="72" height="480" rx="8" fill="#F97316"/>
  </g>
  <polyline points="184,660 284,600 384,520 484,570 584,490 684,415 784,350 884,295" fill="none" stroke="url(#chartLine)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="884" cy="295" r="14" fill="#F97316"/>
  <circle cx="884" cy="295" r="7" fill="#FFFFFF"/>
  <text x="512" y="580" font-family="Arial Black, Arial, sans-serif" font-size="380" font-weight="800" fill="url(#accent)" text-anchor="middle" dominant-baseline="middle">F</text>
  <text x="512" y="800" font-family="Arial, sans-serif" font-size="72" font-weight="300" fill="#94A3B8" text-anchor="middle" letter-spacing="18">finn.</text>
</svg>`;

var blob = new Blob([svg], {type: 'image/svg+xml'});
var url = URL.createObjectURL(blob);
var img = new Image();
img.onload = function() {
  var c = document.getElementById('c');
  var ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, 1024, 1024);
  URL.revokeObjectURL(url);
};
img.src = url;

function dl() {
  var c = document.getElementById('c');
  var a = document.createElement('a');
  a.download = 'finn-icon-1024.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
